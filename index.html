<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo}=React;

// ══ CONFIG ══
// ⚠️ 每次「建立新版本重新部署」URL 不變，只有「建立全新部署」才會換 URL
// 所以只要用同一個部署 ID，不需要每次更新
const GAS_URL='https://script.google.com/macros/s/AKfycbxMcktk_mIHMe8yrTCat0-1oWfNuVjvzTfru2CMh8aY9rSkLxU2yeU9IJxTSuk7JBxb1w/exec';

// ══ API ══
// GAS CORS 解決方案：全部用 GET + URL params
// 原因：GAS POST 會 redirect → body 丟失 → 寫入失敗
// GET 不 preflight，CORS header 在 final response 上，完全正常運作
// ── API: CORS 解法 ──
// GAS redirect 會讓 CORS header 消失，用 JSONP 繞過
// Writes 用 no-cors POST（寫入成功，回應 opaque 沒差）
// Reads 用 JSONP（script tag，完全不受 CORS 限制）
function gasCallJsonp(url){
  return new Promise((resolve,reject)=>{
    const cb='_gc'+Date.now();
    const s=document.createElement('script');
    const t=setTimeout(()=>{cleanup();reject(new Error('JSONP timeout'));},12000);
    const cleanup=()=>{delete window[cb];document.head.removeChild(s);clearTimeout(t);};
    window[cb]=data=>{cleanup();resolve(data);};
    s.src=url+'&callback='+cb;
    s.onerror=()=>{cleanup();reject(new Error('Failed to fetch'));};
    document.head.appendChild(s);
  });
}

const READ_ACTIONS=new Set(['getAll','getLedgers','getSettlements','getConfig','getJobResult']);
async function gasCall(action,payload={}){
  if(!GAS_URL) throw new Error('未設定 GAS_URL');
  if(READ_ACTIONS.has(action)){
    // JSONP GET — no CORS restriction
    const p={action};
    Object.entries(payload).forEach(([k,v])=>{
      p[k]=typeof v==='object'?JSON.stringify(v):String(v);
    });
    const qs=Object.entries(p).map(([k,v])=>
      encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
    return await gasCallJsonp(GAS_URL+'?'+qs);
  }else if(action==='ocrImage'){
    // OCR: 2-step async pattern to work around GAS CORS
    // Step 1: POST image + jobId (no-cors, fire-and-forget)
    const jobId='job_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'ocrImage',...payload,jobId}),mode:'no-cors'});
    // Step 2: Poll via JSONP until result appears (max 45s)
    await new Promise(r=>setTimeout(r,4000)); // initial wait for processing
    for(let i=0;i<20;i++){
      await new Promise(r=>setTimeout(r,2000));
      try{
        const r=await gasCallJsonp(GAS_URL+'?action=getJobResult&jobId='+encodeURIComponent(jobId));
        if(r&&r.status==='done') return r.result;
        if(r&&r.status==='error') throw new Error(r.error||'AI 識別失敗');
        // status==='pending' → keep polling
      }catch(e){if(e.message!=='JSONP timeout')throw e;}
    }
    throw new Error('AI 識別逾時，請重試');
  }else{
    // Regular writes: no-cors POST
    fetch(GAS_URL,{method:'POST',body:JSON.stringify({action,...payload}),mode:'no-cors'});
    await new Promise(r=>setTimeout(r,1400));
    return{success:true};
  }
}

// ══ CONSTANTS ══
// Dynamic category system with localStorage persistence
const DEFAULT_CATS=[{n:'餐飲',i:'🍜'},{n:'交通',i:'🚗'},{n:'住宿',i:'🏠'},{n:'娛樂',i:'🎉'},{n:'購物',i:'🛍️'},{n:'其他',i:'📌'}];
function loadCatList(){try{const v=localStorage.getItem('cats_v2');return v?JSON.parse(v):DEFAULT_CATS.slice();}catch(e){return DEFAULT_CATS.slice();}}
function saveCatList(arr){try{localStorage.setItem('cats_v2',JSON.stringify(arr));}catch(e){}}
function buildCatGlobals(){
  const cl=loadCatList();
  window.CATS=cl.map(x=>x.n);
  window.CICO={};cl.forEach(x=>{window.CICO[x.n]=x.i;});
}
buildCatGlobals();
// Accessor so components always get latest
const getCats=()=>window.CATS||['餐飲','交通','住宿','娛樂','購物','其他'];
const getCico=()=>window.CICO||{'餐飲':'🍜','交通':'🚗','住宿':'🏠','娛樂':'🎉','購物':'🛍️','其他':'📌'};
// Keep backward compat
let CATS=getCats(), CICO=getCico();

const ESET={
  '臉/人物':['😀','😎','🤓','🥳','🤠','👻','🤖','🦸','🧙','🥷','👰','🤵','👮','🧑','🕵️','🤴','👸'],
  '動物':['🐶','🐱','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐙','🦋','🐬','🦄','🐧','🦉','🐢','🐘','🦒'],
  '食物':['🍕','🍜','🍣','🍔','🌮','🍦','🧁','🍰','☕','🧋','🍺','🍷','🥤','🍩','🥐'],
  '生活':['🏠','🚗','✈️','🎮','🎵','🎨','💻','⌚','👜','💍','🎒','🌈','⭐','🔥','💎','💰'],
  '符號':['❤️','💛','💚','💙','💜','🖤','🤍','💯','✅','⚡','🌟','🔔','🎵','🎶','💸','🏅'],
};
const EMOS=['🐶','🐱','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐙','🦋','🐬'];
const fmt=n=>'NT$'+Math.abs(Math.round(Number(n))).toLocaleString();
const today=()=>new Date().toISOString().slice(0,10);
const dav=n=>!n?'👤':EMOS[[...n].reduce((a,c)=>a+c.charCodeAt(0),0)%EMOS.length];
const mav=m=>typeof m==='object'?m.avatar||dav(m.name):dav(m);
const mname=m=>typeof m==='object'?m.name:m;

function calcSettle(expenses,members){
  const bal={};members.forEach(m=>bal[mname(m)]=0);
  expenses.forEach(e=>{
    const t=parseFloat(e.amount),ps=e.participants;
    if(bal[e.payer]!==undefined)bal[e.payer]+=t;
    if(Array.isArray(ps)){const s=t/ps.length;ps.forEach(p=>{if(bal[p]!==undefined)bal[p]-=s;});}
    else if(ps&&typeof ps==='object'){Object.entries(ps).forEach(([k,v])=>{if(bal[k]!==undefined)bal[k]-=parseFloat(v);});}
  });
  const tx=[],cr=[],db=[];
  Object.entries(bal).forEach(([p,a])=>{if(a>0.01)cr.push({p,a});if(a<-0.01)db.push({p,a:-a});});
  cr.sort((a,b)=>b.a-a.a);db.sort((a,b)=>b.a-a.a);
  let i=0,j=0;
  while(i<cr.length&&j<db.length){
    const pay=Math.min(cr[i].a,db[j].a);
    tx.push({from:db[j].p,to:cr[i].p,amount:Math.round(pay)});
    cr[i].a-=pay;db[j].a-=pay;
    if(cr[i].a<0.01)i++;if(db[j].a<0.01)j++;
  }
  return{balance:bal,transactions:tx};
}

// ══ SMALL COMPONENTS ══
function Spin(){return<div className="w-7 h-7 border-2 border-bd border-t-pri rounded-full animate-spin mx-auto my-16"/>}
function Toast({msg,type,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2200);return()=>clearTimeout(t);},[]);
  const col=type==='ok'?'border-grn text-grn':type==='err'?'border-red text-red':'border-bd text-tx';
  return<div className={`fixed left-1/2 -translate-x-1/2 z-[999] px-5 py-3 rounded-3xl text-sm font-semibold whitespace-nowrap border bg-c2 fade ${col}`}
    style={{bottom:'calc(72px + env(safe-area-inset-bottom,0px))'}}>
    {msg}</div>;
}
function Sheet({children,onClose,title}){
  return<div className="fixed inset-0 z-[200] flex items-end justify-center"
    style={{background:'rgba(0,0,0,.7)'}} onClick={onClose}>
    <div className="bg-c1 rounded-t-3xl w-full max-w-lg max-h-[88vh] flex flex-col slide-up"
      onClick={e=>e.stopPropagation()}>
      <div className="flex items-center justify-between px-5 pt-3 pb-3 flex-shrink-0">
        <div className="flex items-center gap-3">
          <div className="w-11 h-1.5 bg-bd rounded-full"/>
          {title&&<span className="font-black text-lg">{title}</span>}
        </div>
        {onClose&&<button onClick={onClose}
          className="w-8 h-8 rounded-full bg-c2 flex items-center justify-center text-tx3 text-base border border-bd">✕</button>}
      </div>
      {title&&<div className="border-t border-bd flex-shrink-0"/>}
      <div className="overflow-y-auto flex-1 px-5 py-4">{children}</div>
    </div>
  </div>;
}
function Btn({children,onClick,variant='pri',className='',disabled=false}){
  const base='w-full py-4 rounded-2xl font-black text-base transition-transform active:scale-95 disabled:opacity-40';
  const v=variant==='pri'?'bg-pri text-bg':variant==='ghost'?'bg-c2 text-tx border border-bd':'bg-red text-white';
  return<button onClick={onClick} disabled={disabled} className={`${base} ${v} ${className}`}>{children}</button>;
}
function Row({left,title,sub,right,onDel,onClick,border=true}){
  return<div className={`flex items-center gap-3 px-4 py-3.5 ${border?'border-b border-bd last:border-0':''}`}
    onClick={onClick} style={onClick?{cursor:'pointer'}:{}}>
    {left&&<div className="w-11 h-11 rounded-2xl bg-c2 flex items-center justify-center text-xl flex-shrink-0">{left}</div>}
    <div className="flex-1 min-w-0">
      <p className="font-semibold text-base leading-tight truncate">{title}</p>
      {sub&&<p className="text-xs text-tx2 mt-0.5 leading-snug">{sub}</p>}
    </div>
    {right&&<div className="text-right flex-shrink-0">{right}</div>}
    {onDel&&<button onClick={e=>{e.stopPropagation();onDel();}} className="text-tx3 text-xl px-1 ml-1">🗑</button>}
  </div>;
}
function Card({children,className=''}){
  return<div className={`bg-c1 rounded-2xl border border-bd overflow-hidden mx-4 mb-3 ${className}`}>{children}</div>;
}
function SectionHeader({title,action,onAction}){
  return<div className="flex items-center justify-between px-5 py-2 mt-1">
    <p className="text-xs font-bold text-tx3 uppercase tracking-widest">{title}</p>
    {action&&<button onClick={onAction} className="text-sm font-bold text-pri">{action}</button>}
  </div>;
}

// ══ HOME PAGE ══
function HomePage({data,onGoPage,ledgerName,onBack}){
  const activeExp=data.activeExpenses||data.expenses||[];
  const{expenses=[],members=[],settlement={},settles=[]}=data;
  const{balance={},transactions=[]}=settlement;
  // Use activeExp (post-settle) for financial stats; expenses for record count
  const total=activeExp.reduce((s,e)=>s+parseFloat(e.amount),0);
  const mo=new Date().toISOString().slice(0,7);
  const wa=new Date(Date.now()-7*864e5).toISOString().slice(0,10);
  const mT=activeExp.filter(e=>(e.date||'').startsWith(mo)).reduce((s,e)=>s+parseFloat(e.amount),0);
  const wT=activeExp.filter(e=>(e.date||'')>=wa).reduce((s,e)=>s+parseFloat(e.amount),0);

  // category stats
  const catTotals={};
  CATS.forEach(c=>catTotals[c]=0);
  activeExp.forEach(e=>{const c=e.category||'其他';if(catTotals[c]!==undefined)catTotals[c]+=parseFloat(e.amount)||0;});
  const catRows=CATS.filter(c=>catTotals[c]>0).sort((a,b)=>catTotals[b]-catTotals[a]);

  return<div className="pb-nav">
    <div className="pt-safe"/>
    {/* Hero */}
    <div className="px-4 pt-3 pb-1 flex items-center gap-3">
      <button onClick={onBack} className="w-9 h-9 rounded-full bg-c2 flex items-center justify-center text-tx2 text-lg flex-shrink-0">←</button>
      <div className="flex-1 min-w-0">
        <p className="font-black text-base truncate">{ledgerName||'帳本'}</p>
      </div>
    </div>
    <div className="px-5 pt-2 pb-2">
      <p className="text-xs font-bold text-tx2 uppercase tracking-widest mb-1">群組累計支出</p>
      <p className="text-5xl font-black tracking-tight">{fmt(total)}</p>
      <div className="flex gap-3 mt-3">
        {[{l:'本月',v:fmt(mT)},{l:'近7天',v:fmt(wT)},{l:'本期',v:activeExp.length+'筆'}].map(s=>
          <div key={s.l} className="flex-1 bg-c1 rounded-2xl p-3 border border-bd text-center">
            <p className="font-black text-sm">{s.v}</p>
            <p className="text-xs text-tx3 mt-0.5">{s.l}</p>
          </div>)}
      </div>
    </div>

    {/* Balance */}
    {members.length>0&&<>
      <SectionHeader title="淨收付" action="結算›" onAction={()=>onGoPage('settle')}/>
      <Card>{members.map((m,i)=>{
        const a=balance[mname(m)]||0;
        return<Row key={i} left={mav(m)} title={mname(m)}
          sub={a>0.5?'別人欠你':a<-0.5?'你欠別人':'已結清'}
          right={<span className={`font-black text-base ${a>0.5?'text-grn':a<-0.5?'text-red':'text-tx3'}`}>
            {(a>=0?'+':'')}{fmt(a)}</span>}/>;
      })}</Card>
    </>}

    {/* Debts */}
    {transactions.length>0&&<>
      <SectionHeader title="需要轉帳" action="查看全部›" onAction={()=>onGoPage('settle')}/>
      <Card>{transactions.slice(0,2).map((t,i)=>{
        const mf=members.find(m=>mname(m)===t.from)||t.from;
        const mt=members.find(m=>mname(m)===t.to)||t.to;
        return<div key={i} className="flex items-center px-4 py-3 border-b border-bd last:border-0">
          <div className="flex flex-col items-center w-16 flex-shrink-0">
            <span className="text-2xl">{mav(mf)}</span>
            <span className="text-xs text-tx2 mt-1 w-16 text-center truncate font-semibold">{t.from}</span>
          </div>
          <div className="flex-1 flex flex-col items-center gap-1 px-3">
            <span className="text-xs text-tx3">需要支付</span>
            <span className="text-lg font-black text-pri">{fmt(t.amount)}</span>
            <div className="w-full flex items-center gap-1">
              <div className="flex-1 h-0.5 bg-bd"/>
              <div className="w-0 h-0 border-t-[5px] border-b-[5px] border-l-[8px] border-transparent border-l-pri"/>
            </div>
          </div>
          <div className="flex flex-col items-center w-16 flex-shrink-0">
            <span className="text-2xl">{mav(mt)}</span>
            <span className="text-xs text-tx2 mt-1 w-16 text-center truncate font-semibold">{t.to}</span>
          </div>
        </div>;
      })}</Card>
    </>}

    {/* Category stats */}
    {catRows.length>0&&<>
      <SectionHeader title="分類統計"/>
      <Card>{catRows.map((c,i)=>{
        const pct=total>0?Math.round(catTotals[c]/total*100):0;
        return<div key={c} className="flex items-center gap-3 px-4 py-3 border-b border-bd last:border-0">
          <span className="text-2xl w-9 text-center">{CICO[c]}</span>
          <div className="flex-1 min-w-0">
            <div className="flex justify-between mb-1">
              <span className="text-sm font-bold">{c}</span>
              <span className="text-sm font-bold">{pct}%</span>
            </div>
            <div className="h-1.5 bg-bd rounded-full overflow-hidden">
              <div className="h-full bg-pri rounded-full transition-all" style={{width:pct+'%'}}/>
            </div>
          </div>
          <span className="text-sm font-black text-right w-20 flex-shrink-0">{fmt(catTotals[c])}</span>
        </div>;
      })}</Card>
    </>}

    {/* Per-member spending stats */}
    {members.length>0&&expenses.length>0&&(()=>{
      const payTotals={};
      members.forEach(m=>payTotals[mname(m)]=0);
      activeExp.forEach(e=>{if(payTotals[e.payer]!==undefined)payTotals[e.payer]+=parseFloat(e.amount)||0;});
      const sorted=members.slice().sort((a,b)=>(payTotals[mname(b)]||0)-(payTotals[mname(a)]||0));
      return<>
        <SectionHeader title="個人付款統計"/>
        <Card>{sorted.map((m,i)=>{
          const n=mname(m);const amt=payTotals[n]||0;
          const pct=total>0?Math.round(amt/total*100):0;
          return<div key={i} className="flex items-center gap-3 px-4 py-3 border-b border-bd last:border-0">
            <div className="w-10 h-10 rounded-full bg-c2 flex items-center justify-center text-xl flex-shrink-0">{mav(m)}</div>
            <div className="flex-1 min-w-0">
              <div className="flex justify-between mb-1">
                <span className="text-sm font-bold">{n}</span>
                <span className="text-sm font-bold text-tx2">{pct}%</span>
              </div>
              <div className="h-1.5 bg-bd rounded-full overflow-hidden">
                <div className="h-full rounded-full transition-all" style={{width:pct+'%',background:'#3498db'}}/>
              </div>
            </div>
            <span className="text-sm font-black text-right w-20 flex-shrink-0">{fmt(amt)}</span>
          </div>;
        })}</Card>
      </>;
    })()}

    {members.length===0&&<Card className="m-4">
      <div className="py-10 text-center">
        <p className="text-5xl mb-3">👥</p>
        <p className="font-black text-lg">還沒有成員</p>
        <p className="text-tx2 text-sm mt-1">先到「成員」頁新增</p>
      </div>
    </Card>}
    <div className="py-3 text-center text-xs text-tx3">↕ 下拉可重新整理</div>
  </div>;
}


// ══ Custom Category Manager ══
const EMOJI_GRID=['🍜','🚗','🏠','🎉','🛍️','📌','☕','🍺','🎬','🏋️','✈️','🏥','📚','💊','🎮',
  '🛒','💡','🔧','👗','🐾','🌿','💰','🎁','🍕','🥗','🚌','🚂','⛽','🏨','🎵',
  '📱','💻','🖨️','🔑','🏊','⚽','🎯','🧴','🧹','🪴'];
function CustomCatManager({onClose,onUpdate}){
  const[cats,setCats]=useState(loadCatList);
  const[newName,setNewName]=useState('');
  const[newIcon,setNewIcon]=useState('📌');
  const[pickingFor,setPickingFor]=useState(null); // null | 'new' | index
  const save=(arr)=>{saveCatList(arr);buildCatGlobals();CATS=getCats();CICO=getCico();onUpdate&&onUpdate();};
  const addCat=()=>{
    if(!newName.trim()){return;}
    if(cats.some(c=>c.n===newName.trim())){alert('分類已存在');return;}
    const updated=[...cats,{n:newName.trim(),i:newIcon}];
    setCats(updated);save(updated);setNewName('');setNewIcon('📌');
  };
  const delCat=(i)=>{if(cats.length<=1)return;const u=cats.filter((_,j)=>j!==i);setCats(u);save(u);};
  const editIcon=(i,icon)=>{const u=cats.map((c,j)=>j===i?{...c,i:icon}:c);setCats(u);save(u);};
  const editName=(i,name)=>{if(!name.trim())return;const u=cats.map((c,j)=>j===i?{...c,n:name.trim()}:c);setCats(u);save(u);};
  const reset=()=>{if(!confirm('重置為預設分類？'))return;setCats(DEFAULT_CATS.slice());save(DEFAULT_CATS.slice());};
  if(pickingFor!==null) return(
    <Sheet title="選擇圖示" onClose={()=>setPickingFor(null)}>
      <div className="grid grid-cols-8 gap-2">
        {EMOJI_GRID.map(em=><button key={em} onClick={()=>{
          if(pickingFor==='new')setNewIcon(em);
          else editIcon(pickingFor,em);
          setPickingFor(null);
        }} className="aspect-square rounded-xl bg-c2 text-2xl flex items-center justify-center active:scale-90">{em}</button>)}
      </div>
    </Sheet>
  );
  return(
    <Sheet title="自訂分類" onClose={onClose}>
      <div className="mb-4">
        {cats.map((cat,i)=>(
          <div key={i} className="flex items-center gap-2 py-2.5 border-b border-bd last:border-0">
            <button onClick={()=>setPickingFor(i)} className="text-2xl w-10 h-10 rounded-xl bg-c2 flex items-center justify-center flex-shrink-0 active:scale-90">{cat.i}</button>
            <input value={cat.n} onChange={e=>editName(i,e.target.value)}
              className="flex-1 bg-c2 border border-bd rounded-xl px-3 py-2 text-sm font-semibold text-tx outline-none focus:border-pri"/>
            {cats.length>1&&<button onClick={()=>delCat(i)} className="text-tx3 text-lg px-2">✕</button>}
          </div>
        ))}
      </div>
      <div className="border-t border-bd pt-4 mb-4">
        <p className="text-xs font-bold text-tx3 uppercase tracking-wider mb-3">新增分類</p>
        <div className="flex gap-2 mb-3">
          <button onClick={()=>setPickingFor('new')} className="text-2xl w-12 h-12 rounded-xl bg-c2 border-2 border-bd flex items-center justify-center flex-shrink-0 active:scale-90">{newIcon}</button>
          <input value={newName} onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&addCat()}
            className="flex-1 bg-c2 border-2 border-bd rounded-2xl px-4 py-3 text-base text-tx outline-none focus:border-pri"
            placeholder="分類名稱" maxLength={10}/>
        </div>
        <Btn onClick={addCat} disabled={!newName.trim()}>新增分類</Btn>
      </div>
      <button onClick={reset} className="w-full py-2 text-xs text-tx3 font-bold">重置為預設分類</button>
    </Sheet>
  );
}


// ══ Mini Calculator ══
function MiniCalc({value,onChange,onClose}){
  const[expr,setExpr]=useState(String(value||''));
  const[display,setDisplay]=useState(String(value||'0'));
  const press=btn=>{
    if(btn==='='){
      try{
        const r=Function('"use strict";return('+expr.replace(/×/g,'*').replace(/÷/g,'/')+')')();
        const rounded=Math.round(r*100)/100;
        setDisplay(String(rounded));setExpr(String(rounded));
      }catch(e){setDisplay('錯誤');setExpr('');}
    }else if(btn==='C'){setExpr('');setDisplay('0');}
    else if(btn==='⌫'){
      const e=expr.slice(0,-1)||'0';setExpr(e);setDisplay(e);
    }else if(btn==='✓'){
      const n=parseFloat(display);if(!isNaN(n)){onChange(n);}onClose();
    }else{
      const e=expr==='0'||expr==='錯誤'?btn:expr+btn;
      setExpr(e);setDisplay(e);
    }
  };
  const rows=[['7','8','9','÷'],['4','5','6','×'],['1','2','3','−'],['C','0','.','＋'],['⌫','=','✓','']];
  return(
    <div className="bg-c1 rounded-2xl border border-bd overflow-hidden">
      <div className="px-4 py-3 bg-c2 text-right">
        <p className="text-2xl font-black text-tx truncate">{display}</p>
      </div>
      <div className="p-2 grid gap-1.5" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
        {rows.flat().map((b,i)=>b?
          <button key={i} onClick={()=>press(b)}
            className={`py-3.5 rounded-xl text-base font-bold active:scale-90 transition-transform
              ${b==='✓'?'bg-pri text-bg col-span-2':b==='='?'bg-pri/20 text-pri':b==='C'?'bg-red/20 text-red':'bg-c2 text-tx'}`}
            style={b==='✓'?{gridColumn:'span 2'}:{}}>
            {b}
          </button>:<div key={i}/>
        )}
      </div>
    </div>
  );
}

// ══ ADD EXPENSE ══
function AddPage({members,expenses=[],onSave,onClose,onImport,toast}){
  const[showCatMgr,setShowCatMgr]=useState(false);
  const[catVer,setCatVer]=useState(0); // increment to force re-render
  const[amt,setAmt]=useState('');
  const[desc,setDesc]=useState('');
  const[date,setDate]=useState(today());
  const[payer,setPayer]=useState(members[0]?mname(members[0]):'');
  const[cat,setCat]=useState('餐飲');
  const[split,setSplit]=useState('equal');
  const[sel,setSel]=useState(members.map(mname));
  const[custom,setCustom]=useState({});
  const[note,setNote]=useState('');
  const[showCalc,setShowCalc]=useState(false);
  const[loading,setLoading]=useState(false);
  const amtRef=useRef();
  useEffect(()=>{setTimeout(()=>amtRef.current?.focus(),350);},[]);

  // Smart quick tags: find recurring descriptions (appear 2+ times)
  const quickTags=useMemo(()=>{
    const freq={};
    expenses.forEach(e=>{
      const k=e.description+'|'+e.category+'|'+e.amount;
      if(!freq[k])freq[k]={desc:e.description,cat:e.category,amt:parseFloat(e.amount),count:0};
      freq[k].count++;
    });
    // Also add manual saved tags from localStorage
    let saved=[];
    try{saved=JSON.parse(localStorage.getItem('quicktags')||'[]');}catch(e){}
    const recurring=Object.values(freq).filter(x=>x.count>=2).sort((a,b)=>b.count-a.count).slice(0,5)
      .map(x=>({icon:CICO[x.cat]||'📌',label:x.desc,cat:x.cat,amt:x.amt,saved:false}));
    const savedTags=saved.map(t=>({...t,saved:true}));
    // merge, dedupe by label
    const seen=new Set();
    return[...savedTags,...recurring].filter(t=>{if(seen.has(t.label))return false;seen.add(t.label);return true;}).slice(0,8);
  },[expenses]);

  const[selTag,setSelTag]=useState(null);
  const applyTag=(tag)=>{
    setDesc(tag.label);setCat(tag.cat);
    if(tag.amt){setAmt(String(tag.amt));}
    setSelTag(tag.label);
  };
  const saveTag=()=>{
    if(!desc.trim()){toast('請先填入描述','err');return;}
    try{
      const saved=JSON.parse(localStorage.getItem('quicktags')||'[]');
      if(saved.some(t=>t.label===desc.trim())){toast('標籤已存在','err');return;}
      saved.unshift({icon:CICO[cat]||'📌',label:desc.trim(),cat,amt:parseFloat(amt)||0});
      localStorage.setItem('quicktags',JSON.stringify(saved.slice(0,10)));
      toast('✅ 已儲存為快速標籤','ok');
    }catch(e){toast('儲存失敗','err');}
  };
  const removeTag=(label)=>{
    try{
      const saved=JSON.parse(localStorage.getItem('quicktags')||'[]');
      localStorage.setItem('quicktags',JSON.stringify(saved.filter(t=>t.label!==label)));
      toast('已移除標籤');
    }catch(e){}
  };
  const toggle=n=>setSel(s=>s.includes(n)?s.filter(x=>x!==n):[...s,n]);
  const csum=Object.values(custom).reduce((a,b)=>a+(parseFloat(b)||0),0);
  const total=parseFloat(amt)||0;
  const submit=async()=>{
    if(!desc.trim()){toast('請輸入描述','err');return;}
    if(!total||total<=0){toast('請輸入金額','err');return;}
    let parts;
    if(split==='equal'){
      if(!sel.length){toast('請選擇分攤對象','err');return;}
      parts=sel;
    }else{
      const obj={};Object.entries(custom).forEach(([k,v])=>{if(parseFloat(v)>0)obj[k]=parseFloat(v);});
      if(!Object.keys(obj).length){toast('請填入各人金額','err');return;}
      if(Math.abs(csum-total)>0.5){toast('合計需等於總金額','err');return;}
      parts=obj;
    }
    setLoading(true);
    try{await onSave({description:desc.trim(),amount:total,payer,date,category:cat,participants:parts,note:note.trim()});
      toast('✅ 已記帳','ok');onClose();}
    catch(e){toast('記帳失敗: '+e.message,'err');}
    finally{setLoading(false);}
  };
  return<div className="fixed inset-0 bg-bg z-[100] flex flex-col slide-up">
    <div className="pt-safe flex-shrink-0"/>
    <div className="flex items-center gap-3 px-4 py-3 border-b border-bd flex-shrink-0">
      <button onClick={onClose} className="w-9 h-9 rounded-full bg-c2 flex items-center justify-center text-tx2">✕</button>
      <h2 className="text-lg font-black flex-1">記帳</h2>
      <button onClick={onImport}
        className="flex items-center gap-1.5 px-3 py-2 bg-c2 rounded-xl border border-bd text-tx2 text-sm font-bold active:opacity-70">
        <span>📥</span><span>匯入</span>
      </button>
    </div>
    <div className="flex-1 overflow-y-auto px-4 pt-4 pb-2">
      {/* Quick tags */}
      {quickTags.length>0&&<div className="mb-5">
        <div className="flex items-center justify-between mb-2">
          <label className="text-xs font-bold text-tx3 uppercase tracking-wider">快速標籤</label>
          <button onClick={saveTag} className="text-xs text-pri font-bold">＋ 儲存目前</button>
        </div>
        <div className="scroll-x">
          {quickTags.map((t,i)=>(
            <div key={i} className="flex-shrink-0 flex items-center gap-1.5">
              <button onClick={()=>applyTag(t)}
                className={`px-4 py-2.5 rounded-3xl text-sm font-semibold border-2 flex items-center gap-1.5 whitespace-nowrap transition-all
                  ${selTag===t.label?'border-pri bg-pri/15 text-pri':'border-bd bg-c2 text-tx2'}`}>
                <span>{t.icon}</span><span>{t.label}</span>
                {t.amt>0&&<span className="text-xs opacity-70">{fmt(t.amt)}</span>}
              </button>
              {t.saved&&<button onClick={()=>removeTag(t.label)} className="text-tx3 text-xs">✕</button>}
            </div>))}
        </div>
      </div>}

      {/* Amount + Calculator */}
      <div className="mb-4">
        <div className="flex items-center justify-between mb-2">
          <label className="text-xs font-bold text-tx3 uppercase tracking-wider">金額</label>
          <button onClick={()=>setShowCalc(s=>!s)} className={`text-xs font-bold px-3 py-1 rounded-xl border ${showCalc?'border-pri text-pri bg-pri/10':'border-bd text-tx2'}`}>🔢 計算機</button>
        </div>
        <div className="relative">
          <span className="absolute left-4 top-1/2 -translate-y-1/2 text-tx3 text-sm font-semibold pointer-events-none" style={{opacity:amt?0:1}}>NT$</span>
          <input ref={amtRef} type="number" value={amt} onChange={e=>setAmt(e.target.value)}
            className="w-full bg-c2 border-2 border-bd rounded-2xl pl-12 pr-4 text-4xl font-black text-tx focus:border-pri outline-none"
            placeholder="0" inputMode="decimal" style={{minHeight:'72px'}}/>
        </div>
        {showCalc&&<div className="mt-2"><MiniCalc value={parseFloat(amt)||0} onChange={v=>{setAmt(String(v));}} onClose={()=>setShowCalc(false)}/></div>}
      </div>
      {/* Desc + Note */}
      <div className="mb-4">
        <label className="text-xs font-bold text-tx3 uppercase tracking-wider block mb-2">描述</label>
        <input type="text" value={desc} onChange={e=>setDesc(e.target.value)}
          className="w-full bg-c2 border-2 border-bd rounded-2xl px-4 py-3.5 text-base text-tx focus:border-pri outline-none mb-2"
          placeholder="例：晚餐、計程車…"/>
        <input type="text" value={note} onChange={e=>setNote(e.target.value)}
          className="w-full bg-c2 border border-bd rounded-2xl px-4 py-3 text-sm text-tx focus:border-pri/60 outline-none"
          placeholder="備註（選填）"/>
      </div>
      {/* Date + Payer */}
      <div className="grid grid-cols-2 gap-3 mb-5">
        <div><label className="text-xs font-bold text-tx3 uppercase tracking-wider block mb-2">日期</label>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)}
            className="w-full bg-c2 border-2 border-bd rounded-2xl px-4 py-3.5 text-base text-tx focus:border-pri outline-none"/></div>
        <div><label className="text-xs font-bold text-tx3 uppercase tracking-wider block mb-2">付款人</label>
          <select value={payer} onChange={e=>setPayer(e.target.value)}
            className="w-full bg-c2 border-2 border-bd rounded-2xl px-4 py-3.5 text-base text-tx focus:border-pri outline-none appearance-none">
            {members.map(m=><option key={mname(m)}>{mname(m)}</option>)}</select></div>
      </div>
      {/* Category */}
      <div className="mb-5">
        <div className="flex items-center justify-between mb-2">
          <label className="text-xs font-bold text-tx3 uppercase tracking-wider">分類</label>
          <button onClick={()=>setShowCatMgr(true)} className="text-xs text-pri font-bold">⚙ 自訂分類</button>
        </div>
        <div className="scroll-x">
          {getCats().map(cc=><button key={cc} onClick={()=>setCat(cc)}
            className={`flex-shrink-0 px-4 py-2.5 rounded-3xl text-sm font-semibold border-2 transition-all ${cat===cc?'border-pri bg-pri/15 text-pri':'border-bd bg-c2 text-tx2'}`}>
            {getCico()[cc]} {cc}</button>)}
        </div>
      </div>
      {showCatMgr&&<CustomCatManager onClose={()=>setShowCatMgr(false)} onUpdate={()=>setCatVer(v=>v+1)}/>}
      {/* Split */}
      <div className="mb-5">
        <label className="text-xs font-bold text-tx3 uppercase tracking-wider block mb-2">分攤方式</label>
        <div className="flex bg-c2 rounded-2xl p-1 gap-1 mb-3">
          {[['equal','⚖️ 平均'],['custom','✏️ 自訂']].map(([v,l])=>
            <button key={v} onClick={()=>setSplit(v)}
              className={`flex-1 py-2.5 rounded-xl text-sm font-bold ${split===v?'bg-pri text-bg':'text-tx2'}`}>{l}</button>)}
        </div>
        {split==='equal'?
          <div className="flex flex-wrap gap-2">{members.map(m=>{const n=mname(m);const on=sel.includes(n);
            return<button key={n} onClick={()=>toggle(n)}
              className={`flex flex-col items-center gap-1.5 px-4 py-3 rounded-2xl border-2 min-w-[70px] ${on?'border-pri bg-pri/15 text-pri':'border-bd bg-c2 text-tx2'}`}>
              <span className="text-2xl">{mav(m)}</span><span className="text-sm font-semibold">{n}</span></button>;})}
          </div>:
          <div className="bg-c2 rounded-2xl overflow-hidden border border-bd">
            {members.map((m,i)=>{const n=mname(m);return(
              <div key={n} className="flex items-center gap-3 px-4 py-3 border-b border-bd last:border-0">
                <span className="text-2xl">{mav(m)}</span>
                <span className="flex-1 font-semibold">{n}</span>
                <div className="relative w-28">
                  <span className="absolute left-3 top-1/2 -translate-y-1/2 text-tx3 text-xs pointer-events-none">NT$</span>
                  <input type="number" value={custom[n]||''} onChange={e=>setCustom(p=>({...p,[n]:e.target.value}))}
                    className="w-full bg-c3 border border-bd rounded-xl pl-9 pr-2 py-2 text-sm font-bold text-right text-tx outline-none focus:border-pri"
                    placeholder="0" inputMode="decimal"/></div></div>);})}
            {total>0&&<div className={`px-4 py-2 text-center text-xs font-semibold ${Math.abs(csum-total)<0.5?'text-grn bg-grn/10':'text-red bg-red/10'}`}>
              {Math.abs(csum-total)<0.5?`✅ ${fmt(csum)} 相符`:csum<total?`⚠ 還差 ${fmt(total-csum)}`:`⚠ 超出 ${fmt(csum-total)}`}</div>}
          </div>}
      </div>
    </div>
    <div className="flex-shrink-0 px-4 pt-3 border-t border-bd pb-safe bg-bg" style={{paddingBottom:'max(16px,env(safe-area-inset-bottom,16px))'}}>
      <Btn onClick={submit} disabled={loading}>{loading?'記帳中…':'✓ 記帳'}</Btn>
    </div>
  </div>;
}

// ══ RECORDS PAGE ══
function RecordsPage({data,onDelete,onImport,ledgerName,onBack,ledgerId}){
  const{expenses=[],members=[],settles=[]}=data;
  const activeExp=data.activeExpenses||expenses;
  const[showSettled,setShowSettled]=useState(false);
  const slb=p=>{
    if(Array.isArray(p))return p.length===members.length?'所有人平分':p.join('、')+' 平分';
    if(p&&typeof p==='object')return Object.entries(p).map(([k,v])=>`${k} ${fmt(v)}`).join(' / ');
    return'';
  };

  // Split: active (post-settle) vs settled (pre-settle)
  const activeIds=new Set((activeExp).map(e=>e.id));
  const activeList=expenses.filter(e=>activeIds.has(e.id));
  const settledList=expenses.filter(e=>!activeIds.has(e.id));

  // Group active by month
  const groups={};
  activeList.forEach(e=>{const m=(e.date||'').slice(0,7);if(!groups[m])groups[m]=[];groups[m].push(e);});

  const[editingExp,setEditingExp]=useState(null); // expense being edited
  const[editNote,setEditNote]=useState('');
  const[editDesc,setEditDesc]=useState('');
  const[editDate,setEditDate]=useState('');
  const[editAmount,setEditAmount]=useState('');
  const[editShowCalc,setEditShowCalc]=useState(false);
  const[editCat,setEditCat]=useState('');
  const saveExpEdit=async()=>{
    if(!editingExp)return;
    try{
      // Send to GAS (no-cors, fire and forget)
      const lid=ledgerId||'default';
      fetch(GAS_URL,{method:'POST',
        body:JSON.stringify({action:'updateExpense',id:editingExp.id,description:editDesc,note:editNote,category:editCat,date:editDate,amount:parseFloat(editAmount)||editingExp.amount,ledgerId:lid}),
        mode:'no-cors'});
      setEditingExp(null);
      toast('✅ 已更新','ok');
      // Reload after short delay
      await new Promise(r=>setTimeout(r,1200));
      if(onDelete) onDelete('__refresh__');
    }catch(e){toast('更新失敗: '+e.message,'err');}
  };

  const ExpRow=({e,settled=false})=>(
    <div className={`flex gap-3 px-4 py-3.5 border-b border-bd last:border-0 ${settled?'opacity-60':''}`}>
      <div onClick={()=>{if(!settled){setEditCat(e.category||'其他');setEditNote(e.note||'');setEditDesc(e.description||'');setEditDate(e.date||'');setEditAmount(String(e.amount||''));setEditingExp(e);}}}
        className={`w-11 h-11 rounded-2xl bg-c2 flex items-center justify-center text-xl flex-shrink-0 relative cursor-pointer ${settled?'':'active:scale-90 transition-transform'}`}>
        {(getCico())[e.category]||'📌'}
        {!settled&&<span className="absolute -top-1 -right-1 w-4 h-4 rounded-full bg-pri border border-bg flex items-center justify-center text-bg font-black" style={{fontSize:'9px'}}>✏</span>}
      </div>
      <div className={`flex-1 min-w-0 ${!settled?'cursor-pointer':''}`}
        onClick={()=>{if(!settled){setEditCat(e.category||'其他');setEditNote(e.note||'');setEditDesc(e.description||'');setEditDate(e.date||'');setEditAmount(String(e.amount||''));setEditingExp(e);}}}>
        <div className="flex items-start gap-2">
          <p className="font-semibold text-base leading-tight flex-1 truncate">{e.description}</p>
          {settled&&<span className="text-[10px] font-bold text-tx3 bg-bd px-1.5 py-0.5 rounded-full flex-shrink-0 mt-0.5">已結算</span>}
          {!settled&&<span className="text-[10px] text-tx3 flex-shrink-0 mt-0.5">點擊編輯</span>}
        </div>
        <p className="text-xs text-tx2 mt-0.5">{e.date?.slice(5)} · {e.payer} 付 · {slb(e.participants)}</p>
        {e.note&&<p className="text-xs text-pri/80 mt-1 flex items-center gap-1">
          <span className="opacity-60">📝</span>{e.note}
        </p>}
      </div>
      <div className="flex-shrink-0 text-right flex flex-col items-end gap-1">
        <p className="font-black text-base">{fmt(e.amount)}</p>
        {!settled&&<button onClick={()=>{if(confirm('確定刪除？'))onDelete(e.id);}}
          className="text-tx3 text-sm">🗑</button>}
      </div>
    </div>
  );



  return<div className="pb-nav">
    <div className="pt-safe"/>
    <div className="px-4 pt-3 pb-1 flex items-center gap-3">
      <button onClick={onBack} className="w-9 h-9 rounded-full bg-c2 flex items-center justify-center text-tx2 text-lg flex-shrink-0">←</button>
      <p className="font-black text-base flex-1 truncate">{ledgerName||'帳目'}</p>
      <button onClick={onImport} className="px-3 py-2 bg-c2 rounded-xl text-sm font-bold text-tx2 border border-bd">📥 匯入</button>
    </div>
    <div className="px-5 pt-2 pb-1">
      <h1 className="text-2xl font-black">帳目</h1>
      <p className="text-tx2 text-sm mt-0.5">本期 {activeList.length} 筆{settledList.length>0?` · 已結算 ${settledList.length} 筆`:''}</p>
    </div>

    {/* Active expenses */}
    {!activeList.length&&<div className="py-12 text-center">
      <p className="text-5xl mb-3">✅</p>
      <p className="font-bold text-lg text-tx2">本期無帳目</p>
    </div>}
    {Object.keys(groups).sort().reverse().map(mo=><div key={mo}>
      <p className="px-5 py-1.5 text-xs font-bold text-tx3 uppercase tracking-wider">{mo}</p>
      <Card>{groups[mo].map(e=><ExpRow key={e.id} e={e}/>)}</Card>
    </div>)}

    {/* Settled expenses — collapsed by default */}
    {settledList.length>0&&<div className="px-4 my-3">
      <button onClick={()=>setShowSettled(s=>!s)}
        className="w-full py-3 bg-c1 rounded-2xl border border-bd text-sm font-bold text-tx3 flex items-center justify-center gap-2">
        <span>🗂 已結算帳目（{settledList.length} 筆）</span>
        <span className={`transition-transform text-xs ${showSettled?'rotate-180':''}`}>▾</span>
      </button>
    </div>}
    {showSettled&&(()=>{
      const sg={};
      settledList.forEach(e=>{const m=(e.date||'').slice(0,7);if(!sg[m])sg[m]=[];sg[m].push(e);});
      return Object.keys(sg).sort().reverse().map(mo=><div key={mo}>
        <p className="px-5 py-1.5 text-xs font-bold text-tx3 uppercase tracking-wider">{mo}</p>
        <Card className="opacity-80">{sg[mo].map(e=><ExpRow key={e.id} e={e} settled={true}/>)}</Card>
      </div>);
    })()}

    {/* Edit expense sheet */}
    {editingExp&&<Sheet title="編輯帳目" onClose={()=>setEditingExp(null)}>
      <div className="grid grid-cols-2 gap-3 mb-4">
        <div>
          <label className="text-xs font-bold text-tx3 uppercase tracking-wider block mb-2">日期</label>
          <input type="date" value={editDate} onChange={e=>setEditDate(e.target.value)}
            className="w-full bg-c2 border-2 border-bd rounded-2xl px-3 py-3 text-sm text-tx focus:border-pri outline-none"/>
        </div>
        <div>
          <label className="text-xs font-bold text-tx3 uppercase tracking-wider block mb-2">金額</label>
          <input type="number" value={editAmount} onChange={e=>setEditAmount(e.target.value)}
            className="w-full bg-c2 border-2 border-bd rounded-2xl px-3 py-3 text-sm font-bold text-tx focus:border-pri outline-none" inputMode="decimal"/>
        </div>
      </div>
      {editShowCalc&&<div className="mb-4"><MiniCalc value={parseFloat(editAmount)||0} onChange={v=>setEditAmount(String(v))} onClose={()=>setEditShowCalc(false)}/></div>}
      <button onClick={()=>setEditShowCalc(s=>!s)} className={`mb-4 text-xs font-bold px-3 py-1.5 rounded-xl border ${editShowCalc?'border-pri text-pri bg-pri/10':'border-bd text-tx2'}`}>🔢 計算機</button>
      <div className="mb-5">
        <label className="text-xs font-bold text-tx3 uppercase tracking-wider block mb-2">帳目名稱</label>
        <input type="text" value={editDesc} onChange={e=>setEditDesc(e.target.value)}
          className="w-full bg-c2 border-2 border-bd rounded-2xl px-4 py-3.5 text-base text-tx focus:border-pri outline-none"
          placeholder="帳目名稱"/>
      </div>
      <div className="mb-5">
        <label className="text-xs font-bold text-tx3 uppercase tracking-wider block mb-2">分類</label>
        <div className="scroll-x">
          {getCats().map(cat=><button key={cat} onClick={()=>setEditCat(cat)}
            className={`flex-shrink-0 px-4 py-2.5 rounded-3xl text-sm font-semibold border-2 whitespace-nowrap ${editCat===cat?'border-pri bg-pri/15 text-pri':'border-bd bg-c2 text-tx2'}`}>
            {getCico()[cat]} {cat}
          </button>)}
        </div>
      </div>
      <div className="mb-5">
        <label className="text-xs font-bold text-tx3 uppercase tracking-wider block mb-2">備註</label>
        <input type="text" value={editNote} onChange={e=>setEditNote(e.target.value)}
          className="w-full bg-c2 border-2 border-bd rounded-2xl px-4 py-3.5 text-base text-tx focus:border-pri outline-none"
          placeholder="新增或修改備註…"/>
      </div>
      <Btn onClick={saveExpEdit}>儲存更改</Btn>
    </Sheet>}
  </div>;
}

// ══ IMPORT SHEET ══
function ImportSheet({members,ledgerId,onDone,onClose,toast,existingExpenses=[]}){
  const[tab,setTab]=useState('file');
  const[rows,setRows]=useState([]);
  const[cols,setCols]=useState([]);
  const[colMap,setColMap]=useState({date:-1,desc:-1,amount:-1});
  const[payer,setPayer]=useState(members[0]?mname(members[0]):'');
  const[aiKey,setAiKey]=useState(()=>localStorage.getItem('ai_key')||'');
  const[aiProv,setAiProv]=useState(()=>localStorage.getItem('ai_prov')||'openai');
  const[backendHasKey,setBackendHasKey]=useState({openai:false,claude:false});
  const[keySource,setKeySource]=useState('local'); // 'local' or 'backend'

  useEffect(()=>{
    gasCall('getConfig',{}).then(cfg=>{
      const bk={openai:!!cfg.hasOpenAiKey,claude:!!cfg.hasClaudeKey};
      setBackendHasKey(bk);
      // Auto-use backend key if available (prefer backend over local)
      const provHasBackend=aiProv==='openai'?bk.openai:bk.claude;
      if(provHasBackend) setKeySource('backend');
    }).catch(()=>{});
  },[]);
  const[aiLoading,setAiLoading]=useState(false);
  const[pdfPass,setPdfPass]=useState('');
  const[pdfPassword,setPdfPassword]=useState('');
  const[showPwdPrompt,setShowPwdPrompt]=useState(false);
  const[pendingPdf,setPendingPdf]=useState(null);
  const[pdfLoading,setPdfLoading]=useState(false);

  const normDate=s=>{s=s.trim();
    if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
    let m=s.match(/^(\d{4})[\/\.](\d{1,2})[\/\.](\d{1,2})$/);if(m)return`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
    m=s.match(/^(\d{2,3})\/(\d{1,2})\/(\d{1,2})$/);if(m)return`${parseInt(m[1])+1911}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
    return s;};
  const guesscat=d=>{const l=d.toLowerCase();
    if(/餐|食|飯|麵|咖啡|coffee|food|全家|7-11|便利/.test(l))return'餐飲';
    if(/捷運|台鐵|高鐵|uber|taxi|計程|加油|停車|mrt/.test(l))return'交通';
    if(/hotel|旅館|住宿|airbnb/.test(l))return'住宿';
    if(/電影|ktv|netflix|spotify/.test(l))return'娛樂';
    if(/超市|百貨|購物|shopee|momo/.test(l))return'購物';
    return'其他';};
  const autoDetect=cs=>{
    const map={date:-1,desc:-1,amount:-1};
    const dk=['日期','date','消費日'],sk=['說明','描述','摘要','商店','消費','明細','description'],ak=['金額','消費金額','amount','台幣'];
    cs.forEach((c,i)=>{const cl=c.toLowerCase();
      if(map.date<0&&dk.some(k=>cl.includes(k)))map.date=i;
      if(map.desc<0&&sk.some(k=>cl.includes(k)))map.desc=i;
      if(map.amount<0&&ak.some(k=>cl.includes(k)))map.amount=i;});
    if(map.date<0)map.date=0;if(map.desc<0)map.desc=cols.length>2?2:1;if(map.amount<0)map.amount=cs.length-1;
    return map;};
  const parseCSV=text=>{
    const lines=text.split(/\r?\n/).filter(l=>l.trim());if(lines.length<2)return{cols:[],rows:[]};
    let hIdx=0;for(let i=0;i<Math.min(8,lines.length);i++){if((lines[i].match(/,/g)||[]).length>=2){hIdx=i;break;}}
    const parseLine=line=>{const res=[],cur=[''];let inQ=false;
      for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){res.push(cur[0].trim());cur[0]='';}else cur[0]+=ch;}
      res.push(cur[0].trim());return res;};
    const cs=parseLine(lines[hIdx]);
    const rs=lines.slice(hIdx+1).map(l=>parseLine(l)).filter(r=>r.some(c=>c.trim()));
    return{cols:cs,rows:rs};};
  const loadPdfViaAi=async(file,pwd)=>{
    // Send PDF to AI for text extraction (handles encrypted PDFs too)
    if(!aiKey&&keySource!=='backend'){toast('PDF 解析需要 API Key','err');return;}
    setPdfLoading(true);
    const reader=new FileReader();
    reader.onload=async e=>{
      const b64=e.target.result.split(',')[1];
      const mtype=file.type;
      const effectiveKey=keySource==='backend'?'':aiKey;
      try{
        const pwdNote=pdfPass?`帳單PDF密碼為「${pdfPass}」。`:'' ;
        const prompt=pwdNote+'這是一份銀行信用卡帳單。請擷取所有消費明細，以JSON陣列回傳，格式：[{"date":"YYYY-MM-DD","description":"消費說明","amount":金額數字}]。只回傳JSON，金額取絕對值，排除0元。';
        let result;
        if(aiProv==='openai'&&keySource==='local'&&effectiveKey){
          // Direct OpenAI call with local key
          const res=await fetch('https://api.openai.com/v1/chat/completions',{
            method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+effectiveKey},
            body:JSON.stringify({model:'gpt-4o',max_tokens:2000,messages:[{role:'user',content:[
              {type:'image_url',image_url:{url:`data:${mtype};base64,${b64}`}},
              {type:'text',text:prompt}]}]})});
          const d=await res.json();
          if(d.error){
            const msg=d.error.message||JSON.stringify(d.error);
            if(d.error.code==='insufficient_quota'||msg.includes('quota')||msg.includes('exceeded'))
              throw new Error('💳 API 額度已用完，請至 platform.openai.com 儲值');
            if(d.error.code==='invalid_api_key'||msg.includes('api_key'))
              throw new Error('🔑 API Key 無效，請確認是否正確');
            throw new Error(msg);
          }
          result=d.choices?.[0]?.message?.content||'';
          const m2=result.match(/\[[\s\S]*\]/);if(!m2)throw new Error('AI無法識別');
          const items2=JSON.parse(m2[0]);
          setAiRows(items2,existingExpenses);
        }else{
          // Route through GAS backend (uses stored key or effectiveKey)
          const r=await gasCall('ocrImage',{apiKey:effectiveKey,base64:b64,mimeType:mtype,provider:aiProv,password:pdfPass});
          if(r.error){
            const msg=r.error;
            if(msg.includes('credit')||msg.includes('balance')||msg.includes('quota'))
              throw new Error('💳 API 額度不足，請至對應平台儲值');
            if(msg.includes('api_key')||msg.includes('authentication'))
              throw new Error('🔑 API Key 無效，請確認設定');
            throw new Error(msg);
          }
          setAiRows(r.items||[],existingExpenses);
        }
      }catch(e){toast('AI 失敗: '+e.message,'err');setAiLoading(false);}
    }
    reader.readAsDataURL(file);
  };

  const loadFile=file=>{
    const ext=file.name.split('.').pop().toLowerCase();
    if(ext==='pdf'){
      // PDF: ask for password first, then route to AI
      setPendingPdf(file);setShowPwdPrompt(true);return;
    }
    if(ext==='csv'){
      const fr=new FileReader();
      fr.onload=e=>{let p=parseCSV(e.target.result);
        if(p.cols.length<2){const fr2=new FileReader();fr2.onload=e2=>{setData(parseCSV(e2.target.result));};fr2.readAsText(file,'big5');}
        else setData(p);};
      fr.readAsText(file,'utf-8');
    }else{
      const XLSX_URL='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      const load=()=>{const fr=new FileReader();fr.onload=e=>{
        const wb=window.XLSX.read(e.target.result,{type:'binary'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const arr=window.XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        let hIdx=0;for(let i=0;i<Math.min(8,arr.length);i++){if(arr[i].filter(c=>String(c).trim()).length>=3){hIdx=i;break;}}
        const cs=arr[hIdx].map(c=>String(c));
        const rs=arr.slice(hIdx+1).filter(r=>r.some(c=>String(c).trim()));
        setData({cols:cs,rows:rs});};fr.readAsBinaryString(file);};
      if(window.XLSX)load();else{const s=document.createElement('script');s.src=XLSX_URL;s.onload=load;document.head.appendChild(s);}
    }};
  const setData=({cols:cs,rows:rs})=>{if(!cs.length){toast('找不到有效資料','err');return;}
    setCols(cs);const m=autoDetect(cs);setColMap(m);
    const existingSet=new Set(existingExpenses.map(e=>`${e.date}|${e.description}|${Math.round(parseFloat(e.amount))}`));
    const filtered=m.amount>=0?rs.filter(r=>{const v=String(r[m.amount]||'').replace(/,/g,'').replace(/[^0-9.\-]/g,'');return Math.abs(parseFloat(v)||0)>0&&String(r[m.amount]).trim()!=='-';})
      .map(r=>{
        const v=String(r[m.amount]||'').replace(/,/g,'').replace(/[^0-9.\-]/g,'');
        r[m.amount]=Math.abs(parseFloat(v)||0);
        const dt=normDate(String(r[m.date>=0?m.date:0]||'').trim());
        const desc=String(r[m.desc>=0?m.desc:1]||'').trim();
        const key=`${dt}|${desc}|${Math.round(r[m.amount])}`;
        r._dup=existingSet.has(key);r._chk=!r._dup;
        r._cat=guesscat(desc);return r;})
      :rs.map(r=>{r._chk=true;r._cat='其他';return r;});
    const dupCount=filtered.filter(r=>r._dup).length;
    if(dupCount>0)toast(`⚠️ 發現 ${dupCount} 筆重複，已自動取消勾選`,'');
    setRows(filtered);};
  const setAiRows=(items,existing)=>{
    const existSet=new Set((existing||[]).map(e=>`${e.date}|${e.description}|${Math.round(parseFloat(e.amount))}`));
    const newRows=items.filter(x=>x.amount>0).map(x=>{
      const row=[normDate(String(x.date)),x.description,x.amount];
      const key=`${row[0]}|${row[1]}|${Math.round(row[2])}`;
      row._chk=!existSet.has(key);row._dup=existSet.has(key);
      row._cat=guesscat(x.description);return row;});
    const dupCount=newRows.filter(r=>r._dup).length;
    if(dupCount>0)toast(`⚠️ 發現 ${dupCount} 筆重複，已自動取消勾選`,'');
    setCols(['date','description','amount']);setColMap({date:0,desc:1,amount:2});
    setRows(newRows);setAiLoading(false);
  };
  const doAiOcr=async file=>{
    setAiLoading(true);
    // Key validation: backend key or local key required
    // If neither exists, GAS will return a descriptive error
    const reader=new FileReader();
    reader.onload=async e=>{
      const b64=e.target.result.split(',')[1];
      const mtype=file.type;
      const effectiveKey=keySource==='backend'?'':aiKey; // empty = use backend key
      try{
        let result;
        const prompt='這是一張信用卡帳單圖片。請擷取所有消費明細，以JSON陣列回傳，格式：[{"date":"YYYY-MM-DD","description":"消費說明","amount":金額數字}]。只回傳JSON，金額取絕對值，排除0元。';
        if(aiProv==='openai'&&keySource==='local'&&effectiveKey){
          // Direct call with local key
          const res=await fetch('https://api.openai.com/v1/chat/completions',{
            method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+effectiveKey},
            body:JSON.stringify({model:'gpt-4o',max_tokens:2000,messages:[{role:'user',content:[
              {type:'image_url',image_url:{url:`data:${mtype};base64,${b64}`}},{type:'text',text:prompt}]}]})});
          const d=await res.json();
        if(d.error){
          const msg=d.error.message||JSON.stringify(d.error);
          if(d.error.code==='insufficient_quota'||msg.includes('quota')||msg.includes('exceeded'))
            throw new Error('💳 API 額度已用完，請至 platform.openai.com 儲值');
          if(d.error.code==='invalid_api_key'||msg.includes('api_key'))
            throw new Error('🔑 API Key 無效，請確認是否正確');
          throw new Error(msg);
        }
          result=d.choices?.[0]?.message?.content||'';
        }else{
          const r=await gasCall('ocrImage',{apiKey:aiKey,base64:b64,mimeType:mtype,provider:'claude'});
          if(r.error){
          const msg=r.error;
          if(msg.includes('credit')||msg.includes('balance')||msg.includes('quota'))
            throw new Error('💳 Claude API 額度不足，請至 console.anthropic.com 儲值');
          if(msg.includes('api_key')||msg.includes('authentication'))
            throw new Error('🔑 API Key 無效，請確認是否正確');
          throw new Error(msg);
        }
          const items=r.items||[];
          setCols(['date','description','amount']);
          setColMap({date:0,desc:1,amount:2});
          setRows(items.filter(x=>x.amount>0).map(x=>{const row=[normDate(String(x.date)),x.description,x.amount];row._chk=true;row._cat=guesscat(x.description);return row;}));
          setAiLoading(false);return;
        }
        const m=result.match(/\[[\s\S]*\]/);if(!m)throw new Error('AI無法識別');
        const items=JSON.parse(m[0]);
        setCols(['date','description','amount']);setColMap({date:0,desc:1,amount:2});
        // Check for duplicates against existing expenses
        const existingSet=new Set(existingExpenses.map(e=>`${e.date}|${e.description}|${Math.round(parseFloat(e.amount))}`));
        const newRows=items.filter(x=>x.amount>0).map(x=>{
          const row=[normDate(String(x.date)),x.description,x.amount];
          const key=`${row[0]}|${row[1]}|${Math.round(row[2])}`;
          row._chk=!existingSet.has(key);row._dup=existingSet.has(key);
          row._cat=guesscat(x.description);return row;});
        const dupCount=newRows.filter(r=>r._dup).length;
        if(dupCount>0)toast(`⚠️ 發現 ${dupCount} 筆重複，已自動取消勾選`,'');
        setRows(newRows);
      }catch(e){toast('AI 失敗: '+e.message,'err');}
      finally{setAiLoading(false);}
    };reader.readAsDataURL(file);};
  const[importing,setImporting]=useState(false);
  const[importProgress,setImportProgress]=useState(0);
  const doImport=async()=>{
    const allParts=members.map(mname);
    const toImport=rows.filter(r=>r._chk!==false&&!r._dup);
    if(!toImport.length){toast('請選擇要匯入的資料','err');return;}
    setImporting(true);setImportProgress(0);
    let ok=0,fail=0;
    for(let i=0;i<toImport.length;i++){
      const r=toImport[i];
      setImportProgress(Math.round((i+1)/toImport.length*100));
      const dt=normDate(String(r[colMap.date>=0?colMap.date:0]||'').trim());
      // Use edited values if present, otherwise fall back to original
      const desc=(r._editDesc!==undefined?r._editDesc:String(r[colMap.desc>=0?colMap.desc:1]||'')).trim();
      const rawAmt=r._editAmt!==undefined?r._editAmt:parseFloat(String(r[colMap.amount>=0?colMap.amount:2]||'').replace(/,/g,'').replace(/[^0-9.]/g,''))||0;
      const amt=Math.abs(rawAmt);
      if(!amt||!desc){fail++;continue;}
      // Final dedup check before writing
      const key=`${dt}|${desc}|${Math.round(amt)}`;
      const already=existingExpenses.some(e=>`${e.date}|${e.description}|${Math.round(parseFloat(e.amount))}`===key);
      if(already){fail++;continue;}
      try{
        fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'add',data:{description:desc,amount:amt,payer,date:dt,category:r._cat||'其他',participants:allParts},ledgerId}),mode:'no-cors'});
        ok++;
        await new Promise(r=>setTimeout(r,180)); // stagger writes
      }catch(e){fail++;}
    }
    await new Promise(r=>setTimeout(r,1200)); // wait for last write
    setImporting(false);
    const msg=`✅ 匯入完成：${ok} 筆成功${fail>0?' · '+fail+' 筆略過':''}`;
    toast(msg,'ok');
    onDone(); // auto-close
  };

  return<Sheet title="匯入帳單" onClose={onClose}>
    {/* PDF password prompt */}
    {showPwdPrompt&&<div className="fixed inset-0 z-[400] flex items-center justify-center px-6" style={{background:'rgba(0,0,0,.8)'}}>
      <div className="bg-c1 rounded-3xl p-6 w-full max-w-sm border border-bd">
        <p className="text-xl font-black mb-1">PDF 密碼</p>
        <p className="text-sm text-tx2 mb-4">
          {pendingPdf?.name}<br/>
          <span className="text-tx3">若 PDF 無密碼請直接點「確認」</span>
        </p>
        <input type="password" value={pdfPassword} onChange={e=>setPdfPassword(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&(setShowPwdPrompt(false),loadPdfViaAi(pendingPdf,pdfPassword))}
          autoFocus autoComplete="off"
          className="w-full bg-c2 border-2 border-bd rounded-2xl px-4 py-3.5 text-base text-tx focus:border-pri outline-none mb-4"
          placeholder="輸入 PDF 密碼（選填）"/>
        <div className="flex gap-3">
          <button onClick={()=>{setShowPwdPrompt(false);setPendingPdf(null);setPdfPassword('');}}
            className="flex-1 py-3.5 rounded-2xl border border-bd text-tx2 font-bold">取消</button>
          <button onClick={()=>{setShowPwdPrompt(false);loadPdfViaAi(pendingPdf,pdfPassword);}}
            className="flex-1 py-3.5 rounded-2xl bg-pri text-bg font-black">確認解析</button>
        </div>
      </div>
    </div>}
    {/* PDF loading overlay */}
    {pdfLoading&&<div className="fixed inset-0 z-[400] flex items-center justify-center" style={{background:'rgba(0,0,0,.7)'}}>
      <div className="bg-c1 rounded-3xl p-8 text-center border border-bd">
        <div className="w-10 h-10 border-3 border-bd border-t-pri rounded-full animate-spin mx-auto mb-4"/>
        <p className="font-bold text-lg">AI 解析 PDF 中</p>
        <p className="text-tx2 text-sm mt-2">銀行帳單通常需要 15-30 秒</p>
      </div>
    </div>}
    {/* AI Key */}
    <div className="mb-4">
      <p className="text-xs font-bold text-tx3 uppercase tracking-wider mb-2">AI 服務</p>
      <div className="flex gap-2 mb-3">
        {[['openai','💬 ChatGPT'],['claude','🤖 Claude']].map(([v,l])=>{
          const hasBackend=(v==='openai'?backendHasKey.openai:backendHasKey.claude);
          return<button key={v} onClick={()=>{setAiProv(v);localStorage.setItem('ai_prov',v);}}
            className={`flex-1 py-2.5 rounded-xl text-sm font-bold border-2 relative ${aiProv===v?'border-pri text-pri bg-pri/10':'border-bd text-tx2 bg-c2'}`}>
            {l}{hasBackend&&<span className="absolute -top-1.5 -right-1.5 w-4 h-4 rounded-full bg-grn text-bg text-[9px] flex items-center justify-center font-black">✓</span>}
          </button>;})}
      </div>
      {/* Show backend key status */}
      {backendHasKey[aiProv]&&keySource==='backend'
        ?<div className="bg-grn/10 border border-grn/30 rounded-xl px-4 py-3 flex items-center gap-3 mb-2">
          <span className="text-xl">🔒</span>
          <div className="flex-1">
            <p className="text-sm font-bold text-grn">後台 API Key 已設定</p>
            <p className="text-xs text-tx3 mt-0.5">可直接使用，無需輸入</p>
          </div>
          <button onClick={()=>setKeySource('local')} className="text-xs text-tx3 underline">手動輸入</button>
        </div>
        :<div>
          {backendHasKey[aiProv]&&<button onClick={()=>setKeySource('backend')} className="text-xs text-pri font-bold mb-2 block">← 使用後台 Key</button>}
          <div className="flex gap-2">
            <input type="password" value={aiKey} onChange={e=>setAiKey(e.target.value)}
              className="flex-1 bg-c2 border border-bd rounded-xl px-3 py-2.5 text-sm text-tx outline-none focus:border-pri"
              placeholder={aiProv==='openai'?'sk-...':'sk-ant-...'}/>

            <div className="flex gap-2">
              <button onClick={()=>setRows(rs=>rs.map(x=>({...x,_chk:true})))} className="text-xs text-pri font-bold">全選</button>

                      const newDesc=e.target.value;

                        // Recheck duplicate with new description
                        const key=`${x[0]}|${newDesc}|${Math.round(x[2])}`;
                        const isDupNew=(existingExpenses||[]).some(e=>`${e.date}|${e.description}|${Math.round(parseFloat(e.amount))}`===key);

                      ${checked&&!isDup?'text-tx':'text-tx2'}`}

                    <p className="text-xs text-tx3 mt-0.5">{String(r[0]).slice(5)} · {r._cat||'其他'} {isDup?'· ⚠️ 重複':''}</p>

                      const key=`${x[0]}|${x[1]}|${Math.round(newAmt)}`;
                      const isDupNew=(existingExpenses||[]).some(e=>`${e.date}|${e.description}|${Math.round(parseFloat(e.amount))}`===key);
                      return{...x,2:newAmt,_dup:isDupNew,_chk:!isDupNew};
                    }));
                  }} className={`w-20 bg-transparent text-sm font-bold text-right outline-none border-b border-transparent focus:border-pri pb-0.5 flex-shrink-0
                    ${checked&&!isDup?'text-tx':'text-tx2'}`}
                    onClick={e=>e.stopPropagation()} inputMode="decimal"/>
                </div>
              </div>;
            })}
          </div>
          <div className="flex gap-2 mb-3">
            <select value={payer} onChange={e=>setPayer(e.target.value)}

          {rows.some(r=>r._dup)&&<div className="bg-red/10 border border-red/30 rounded-xl px-3 py-2 mb-3 text-xs text-red">
            ⚠️ 灰色項目與現有帳目重複，已自動取消勾選

          {importing?<div className="w-full py-4 rounded-2xl bg-pri/20 border border-pri text-center">

            <div className="h-2 bg-bd rounded-full overflow-hidden mx-4">
              <div className="h-full bg-pri rounded-full transition-all" style={{width:importProgress+'%'}}/>
            </div>
          </div>:<Btn onClick={doImport}>⬆️ 匯入 {rows.filter(r=>r._chk!==false&&!r._dup).length} 筆帳目</Btn>}
        </div>}
    </>}
  </Sheet>;
}

// ══ SETTLE PAGE ══
function SettlePage({data,ledgerId,onRefresh,toast,ledgerName,onBack,onLocalSettle}){
  const{members=[],expenses=[],settlement={},settles=[]}=data;
  const activeExp=data.activeExpenses||data.expenses||[];
  const{balance={},transactions=[]}=settlement;
  const[showDetail,setShowDetail]=useState(null);
  const doSettle=async()=>{
    const note=prompt('結清備註（可留空）','');if(note===null)return;
    const snap={transactions,expense_count:activeExp.length,
      balances:Object.entries(balance).map(([p,a])=>({person:p,amount:Math.round(a)}))};
    try{
      await gasCall('addSettle',{data:{note:note||'結清 '+new Date().toLocaleDateString('zh-TW'),settled_at:new Date().toISOString(),snapshot:snap},ledgerId});
      toast('✅ 結清完成！','ok');
      // Immediately zero out local settlement for instant UI feedback
      if(onLocalSettle) onLocalSettle();
      await new Promise(r=>setTimeout(r,1600));
      await onRefresh();
    }catch(e){toast('儲存失敗: '+e.message,'err');}};
  const delSettle=async id=>{
    if(!confirm('確定刪除？'))return;
    try{await gasCall('deleteSettle',{id,ledgerId});toast('已刪除');onRefresh();}
    catch(e){toast('刪除失敗','err');}};
  return<div className="pb-nav">
    <div className="pt-safe"/>
    <div className="px-4 pt-3 pb-1 flex items-center gap-3">
      <button onClick={onBack} className="w-9 h-9 rounded-full bg-c2 flex items-center justify-center text-tx2 text-lg flex-shrink-0">←</button>
      <p className="font-black text-base flex-1 truncate">{ledgerName||'結算'}</p>
    </div>
    <div className="px-5 pt-2 pb-2"><h1 className="text-2xl font-black">結算</h1></div>
    <SectionHeader title="各人餘額"/>
    <Card>{!members.length&&<p className="px-4 py-4 text-tx2 text-sm text-center">尚無成員</p>}
      {members.map((m,i)=>{const a=balance[mname(m)]||0;
        return<Row key={i} left={mav(m)} title={mname(m)}
          sub={a>0.5?`待收 ${fmt(a)}`:a<-0.5?`待付 ${fmt(a)}`:'已結清'}
          right={<span className={`font-black ${a>0.5?'text-grn':a<-0.5?'text-red':'text-tx3'}`}>{(a>=0?'+':'')}{fmt(a)}</span>}/>;
      })}
    </Card>
    <SectionHeader title="轉帳建議"/>
    <Card>{transactions.length===0&&members.length>0?
      <p className="px-4 py-5 text-grn font-bold text-center">🎉 目前已結清！</p>:
      transactions.map((t,i)=>{
        const mf=members.find(m=>mname(m)===t.from)||t.from;
        const mt=members.find(m=>mname(m)===t.to)||t.to;
        return<div key={i} className="flex items-center px-4 py-4 border-b border-bd last:border-0">
          <div className="flex flex-col items-center w-16 flex-shrink-0">
            <span className="text-2xl">{mav(mf)}</span>
            <span className="text-xs text-tx2 mt-1 truncate w-16 text-center font-semibold">{t.from}</span>
          </div>
          <div className="flex-1 flex flex-col items-center gap-1 px-2">
            <span className="text-xs text-tx3">需要支付</span>
            <span className="text-xl font-black text-pri">{fmt(t.amount)}</span>
            <div className="w-full flex items-center gap-1">
              <div className="flex-1 h-0.5 bg-bd"/>
              <div className="w-0 h-0 border-t-[5px] border-b-[5px] border-l-[8px] border-transparent border-l-pri"/>
            </div>
          </div>
          <div className="flex flex-col items-center w-16 flex-shrink-0">
            <span className="text-2xl">{mav(mt)}</span>
            <span className="text-xs text-tx2 mt-1 truncate w-16 text-center font-semibold">{t.to}</span>
          </div>
        </div>;})}</Card>
    {transactions.length>0&&<div className="px-4 mb-4">
      <Btn onClick={doSettle}>✅ 結清並記錄</Btn></div>}
    {settles.length>0&&(()=>{
      const[showHist,setShowHist]=useState(false);
      return<>
        <div className="px-4 mb-3">
          <button onClick={()=>setShowHist(h=>!h)}
            className="w-full py-3 bg-c1 rounded-2xl border border-bd text-sm font-bold text-tx2 flex items-center justify-center gap-2">
            <span>📁 歷史結清紀錄（{settles.length} 筆）</span>
            <span className={`transition-transform ${showHist?'rotate-180':''}`}>▾</span>
          </button>
        </div>
        {showHist&&<Card>{settles.map((s,i)=>{
          const dt=s.settled_at?new Date(s.settled_at).toLocaleDateString('zh-TW'):'';
          const snap=s.snapshot||{};
          return<Row key={i} left="📋" title={s.note||'結清紀錄'} sub={`${dt}${snap.expense_count?' · '+snap.expense_count+'筆':''}`}
            onDel={()=>delSettle(s.id)} onClick={()=>setShowDetail(s)}/>;})}</Card>}
      </>;
    })()}
    {showDetail&&<Sheet title={showDetail.note||'結清紀錄'} onClose={()=>setShowDetail(null)}>
      <p className="text-xs text-tx3 mb-3">{showDetail.settled_at?new Date(showDetail.settled_at).toLocaleDateString('zh-TW'):''}</p>
      {(showDetail.snapshot?.transactions||[]).map((t,i)=>
        <div key={i} className="flex items-center justify-between py-2 border-b border-bd last:border-0">
          <span className="text-base">{t.from} → {t.to}</span>
          <span className="font-black text-pri">{fmt(t.amount)}</span>
        </div>)}
      <div className="mt-4"><Btn onClick={()=>setShowDetail(null)} variant="ghost">關閉</Btn></div>
    </Sheet>}
  </div>;
}
