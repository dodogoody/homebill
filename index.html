// ══ Admin clear button with PIN ══
const ADMIN_PIN_KEY='admin_pin_hash';
function simpleHash(s){let h=0;for(let i=0;i<s.length;i++){h=(Math.imul(31,h)+s.charCodeAt(i))|0;}return String(h);}

function AdminClearBtn({ledgerId,onRefresh,toast}){
  const[step,setStep]=useState(0); // 0=button 1=set-pin 2=enter-pin 3=confirm
  const[pin,setPin]=useState('');
  const[input,setInput]=useState('');
  const storedHash=()=>localStorage.getItem(ADMIN_PIN_KEY);

  const handlePress=()=>{
    if(!storedHash()){setStep(1);setPin('');}// first time: set PIN
    else{setStep(2);setInput('');}// has PIN: verify
  };

  const setAdminPin=()=>{
    if(pin.length<4){toast('PIN 至少 4 位','err');return;}
    localStorage.setItem(ADMIN_PIN_KEY,simpleHash(pin));
    setStep(3);setInput('');
  };

  const verifyPin=()=>{
    if(simpleHash(input)===storedHash()){setStep(3);}
    else{toast('PIN 錯誤','err');setInput('');}
  };

  const doClear=async()=>{
    if(!confirm('⚠️ 確定永久刪除所有帳目？此操作無法復原！'))return;
    try{
      fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'clearExpenses',ledgerId}),mode:'no-cors'});
      await new Promise(r=>setTimeout(r,1500));
      await onRefresh();
      toast('✅ 已清除所有帳目','ok');setStep(0);
    }catch(e){toast('清除失敗','err');}
  };

  if(step===0) return(
    <button onClick={handlePress}
      className="w-full py-3 rounded-2xl border-2 border-red/40 text-red text-sm font-bold bg-red/5 active:opacity-70">
      🗑 清除所有帳目（需管理者 PIN）
    </button>
  );

  if(step===1) return(
    <div className="bg-red/5 border border-red/30 rounded-2xl p-4">
      <p className="text-sm font-bold text-red mb-1">設定管理者 PIN</p>
      <p className="text-xs text-tx3 mb-3">首次使用需設定 PIN，之後每次清除都需要輸入。</p>
      <input type="password" value={pin} onChange={e=>setPin(e.target.value)} inputMode="numeric"
        className="w-full bg-c2 border border-bd rounded-xl px-4 py-3 text-base text-tx outline-none focus:border-red mb-3"
        placeholder="輸入 4-8 位 PIN" maxLength={8}/>
      <div className="flex gap-2">
        <button onClick={()=>setStep(0)} className="flex-1 py-2.5 rounded-xl bg-c2 border border-bd text-sm font-bold text-tx2">取消</button>
        <button onClick={setAdminPin} className="flex-1 py-2.5 rounded-xl bg-red text-white text-sm font-bold">設定 PIN</button>
      </div>
    </div>
  );

  if(step===2) return(
    <div className="bg-red/5 border border-red/30 rounded-2xl p-4">
      <p className="text-sm font-bold text-red mb-3">請輸入管理者 PIN</p>
      <input type="password" value={input} onChange={e=>setInput(e.target.value)} inputMode="numeric"
        onKeyDown={e=>e.key==='Enter'&&verifyPin()}
        className="w-full bg-c2 border border-bd rounded-xl px-4 py-3 text-base text-tx outline-none focus:border-red mb-3"
        placeholder="PIN" maxLength={8} autoFocus/>
      <div className="flex gap-2">
        <button onClick={()=>setStep(0)} className="flex-1 py-2.5 rounded-xl bg-c2 border border-bd text-sm font-bold text-tx2">取消</button>
        <button onClick={verifyPin} className="flex-1 py-2.5 rounded-xl bg-red text-white text-sm font-bold">確認</button>
      </div>
    </div>
  );

  return(
    <div className="bg-red/10 border-2 border-red/50 rounded-2xl p-4">
      <p className="text-sm font-black text-red mb-1">⚠️ 危險操作</p>
      <p className="text-xs text-tx2 mb-4">這將永久刪除此帳本的所有帳目，無法復原。成員資料不受影響。</p>
      <div className="flex gap-2">
        <button onClick={()=>setStep(0)} className="flex-1 py-2.5 rounded-xl bg-c2 border border-bd text-sm font-bold text-tx2">取消</button>
        <button onClick={doClear} className="flex-1 py-2.5 rounded-xl bg-red text-white text-sm font-bold">確認清除</button>
      </div>
    </div>
  );
}

// ══ MEMBERS PAGE ══
function MembersPage({data,ledgerId,onRefresh,toast,ledgerName,onBack}){
  const{members=[]}=data;
  const[newName,setNewName]=useState('');
  const[saving,setSaving]=useState(false);
  const[editAvatar,setEditAvatar]=useState(null);
  const[editName,setEditName]=useState(''); // name of member being renamed
  const[editNameVal,setEditNameVal]=useState('');
  const shareUrl=window.location.href.replace(/[?&]createOAuthDialog=true/g,'').split('#')[0]+'#l='+ledgerId;
  const copyLink=()=>{navigator.clipboard?.writeText(shareUrl).then(()=>toast('✅ 連結已複製','ok'))||prompt('複製此連結：',shareUrl);};
  const saveName=async(oldName)=>{
    const newName=editNameVal.trim();
    setEditName('');
    if(!newName||newName===oldName)return;
    if(members.some(m=>mname(m)===newName)){toast('名稱已存在','err');return;}
    const updated=members.map(m=>mname(m)===oldName?{...(typeof m==='object'?m:{name:m}),name:newName}:m);
    try{await gasCall('saveMembers',{members:updated,ledgerId});onRefresh();toast('✅ 已更新名稱','ok');}
    catch(e){toast('儲存失敗','err');};};
  const saveAvatar=async(name,emoji)=>{
    const updated=members.map(m=>mname(m)===name?{...(typeof m==='object'?m:{name:m}),avatar:emoji}:m);
    try{await gasCall('saveMembers',{members:updated,ledgerId});onRefresh();toast('✅ 已更新頭像','ok');}
    catch(e){toast('儲存失敗','err');}
    setEditAvatar(null);};
  const add=async()=>{
    const name=newName.trim();if(!name)return;
    if(members.some(m=>mname(m)===name)){toast('成員已存在','err');return;}
    setSaving(true);
    try{const updated=[...members,{name,avatar:''}];
      await gasCall('saveMembers',{members:updated,ledgerId});
      setNewName('');onRefresh();toast('✅ 已新增 '+name,'ok');}
    catch(e){toast('儲存失敗','err');}finally{setSaving(false);}};
  const remove=async name=>{
    if(!confirm(`確定移除「${name}」？`))return;
    try{await gasCall('saveMembers',{members:members.filter(m=>mname(m)!==name),ledgerId});
      onRefresh();toast('已移除 '+name);}
    catch(e){toast('移除失敗','err');}};
  return<div className="pb-nav">
    <div className="pt-safe"/>
    <div className="px-4 pt-3 pb-1 flex items-center gap-3">
      <button onClick={onBack} className="w-9 h-9 rounded-full bg-c2 flex items-center justify-center text-tx2 text-lg flex-shrink-0">←</button>
      <p className="font-black text-base flex-1 truncate">{ledgerName||'成員'}</p>
    </div>
    <div className="px-5 pt-2 pb-2"><h1 className="text-2xl font-black">成員</h1>
      <p className="text-tx2 text-sm mt-0.5">{members.length} 位成員</p></div>
    <Card>
      {!members.length&&<p className="px-4 py-4 text-tx2 text-sm text-center">尚無成員</p>}
      {members.map((m,i)=>{
        const n=mname(m);
        const isEditing=editName===n;
        return<div key={i} className="flex items-center gap-3 px-4 py-3 border-b border-bd last:border-0">
          <button onClick={()=>setEditAvatar(n)}
            className="w-11 h-11 rounded-full bg-c2 flex items-center justify-center text-2xl relative active:scale-90 transition-transform flex-shrink-0">
            {mav(m)}
            <span className="absolute -bottom-0.5 -right-0.5 w-4 h-4 rounded-full bg-pri border-2 border-bg flex items-center justify-center text-[9px] font-black text-bg">✏</span>
          </button>
          {isEditing
            ?<input autoFocus value={editNameVal} onChange={e=>setEditNameVal(e.target.value)}
                onBlur={()=>saveName(n)} onKeyDown={e=>{if(e.key==='Enter')saveName(n);if(e.key==='Escape')setEditName('');}}
                className="flex-1 bg-c3 border border-pri rounded-xl px-3 py-2 text-base font-bold text-tx outline-none"/>
            :<div className="flex-1 flex items-center gap-2 min-w-0">
              <p className="font-bold text-base flex-1 truncate">{n}</p>
              <button onClick={()=>{setEditName(n);setEditNameVal(n);}} className="text-tx3 text-sm px-1">✏️</button>
            </div>}
          <button onClick={()=>remove(n)} className="text-tx3 text-xl px-1 flex-shrink-0">✕</button>
        </div>;})}
      <div className="flex gap-3 px-4 py-3 border-t border-bd">
        <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}
          className="flex-1 bg-c3 border border-bd rounded-xl px-4 py-3 text-base text-tx outline-none focus:border-pri"
          placeholder="輸入姓名" maxLength={10}/>
        <button onClick={add} disabled={saving}
          className="px-5 py-3 bg-pri rounded-xl text-bg font-black text-base disabled:opacity-50">新增</button>
      </div>
    </Card>
    {/* Share link */}
    <SectionHeader title="分享帳本"/>
    <Card>
      <div className="px-4 py-4">
        <p className="text-sm text-tx2 mb-3">分享此連結給朋友，一起記帳</p>
        <div className="flex gap-2 items-center bg-c2 rounded-xl px-3 py-2.5 mb-3 border border-bd">
          <p className="flex-1 text-xs text-tx3 truncate">{shareUrl}</p>
        </div>
        <Btn onClick={copyLink} variant="ghost">🔗 複製連結</Btn>
      </div>
    </Card>
    {/* API settings */}
    <SectionHeader title="設定"/>
    <Card>
      <div className="px-4 py-4">
        <p className="text-sm text-tx2 mb-1">帳本 ID：<span className="text-tx font-bold">{ledgerId}</span></p>
        <p className="text-xs text-tx3">後端：{GAS_URL?'已連接 Google Sheets':'使用 Mock 資料'}</p>
      </div>
    </Card>

    {/* Danger zone - reset data */}
    <SectionHeader title="危險區域"/>
    <Card>
      <div className="px-4 py-4">
        <p className="text-sm text-tx2 mb-3">清除此帳本所有帳目（成員保留），適合正式啟用前清除測試資料。</p>
        <AdminClearBtn ledgerId={ledgerId} onRefresh={onRefresh} toast={toast}/>
      </div>
    </Card>
    {editAvatar&&<AvatarPicker
      name={editAvatar}
      current={mav(members.find(m=>mname(m)===editAvatar)||editAvatar)}
      onPick={emoji=>saveAvatar(editAvatar,emoji)}
      onClose={()=>setEditAvatar(null)}/>}
  </div>;
}

// ══ NAV ══
function Nav({page,onNav,onAdd}){
  const tabs=[{id:'home',icon:'📊',label:'總覽'},{id:'records',icon:'📋',label:'帳目'},null,{id:'settle',icon:'💸',label:'結算'},{id:'members',icon:'👥',label:'成員'}];
  return<nav className="fixed bottom-0 left-0 right-0 bg-c1/95 backdrop-blur-xl border-t border-bd z-40 flex items-center px-2 pb-safe"
    style={{height:'calc(60px + env(safe-area-inset-bottom,0px))'}}>
    {tabs.map((t,i)=>t===null?
      <div key="fab" className="flex-1 flex justify-center items-center">
        <button onClick={onAdd} className="w-14 h-14 rounded-full bg-pri flex items-center justify-center text-2xl text-bg font-black shadow-lg active:scale-90 transition-transform"
          style={{boxShadow:'0 0 0 8px rgba(245,200,66,.12),0 4px 20px rgba(245,200,66,.35)'}}>＋</button>
      </div>:
      <button key={t.id} onClick={()=>onNav(t.id)}
        className={`flex-1 flex flex-col items-center justify-center gap-1 h-full active:opacity-70 ${page===t.id?'text-pri':'text-tx3'}`}>
        <span className="text-2xl leading-none">{t.icon}</span>
        <span className="text-xs font-bold">{t.label}</span>
      </button>)}
  </nav>;
}

// ══ LEDGER LIST PAGE ══
const LEMOJI=['💰','✈️','🏖️','🏠','🎉','🍽️','🎮','📚','💼','🎸','🏋️','🚗','🌏','🎁','🌴','🏕️','🎭','🛒','☕','🎵'];

function LedgerPage({onEnter,toast}){
  const[ledgers,setLedgers]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showNew,setShowNew]=useState(false);
  const[newName,setNewName]=useState('');
  const[newEmoji,setNewEmoji]=useState('💰');
  const[editId,setEditId]=useState(null);
  const[editName,setEditName]=useState('');
  const[editEmoji,setEditEmoji]=useState('💰');
  const[saving,setSaving]=useState(false);

  const load=async()=>{
    try{const d=await gasCall('getLedgers',{});
      setLedgers(d.ledgers||[]);}
    catch(e){toast('載入失敗: '+e.message,'err');}
    finally{setLoading(false);}};
  useEffect(()=>{load();},[]);

  const create=async()=>{
    if(!newName.trim()){toast('請輸入帳本名稱','err');return;}
    setSaving(true);
    try{
      await gasCall('createLedger',{name:newName.trim(),emoji:newEmoji});
      // wait extra for no-cors write to complete then reload
      await new Promise(r=>setTimeout(r,1500));
      await load();setShowNew(false);setNewName('');toast('✅ 已建立','ok');}
    catch(e){toast('建立失敗: '+e.message,'err');}finally{setSaving(false);}};

  const save=async()=>{
    if(!editName.trim()){toast('請輸入名稱','err');return;}
    setSaving(true);
    try{
      await gasCall('renameLedger',{id:editId,name:editName.trim(),emoji:editEmoji});
      await new Promise(r=>setTimeout(r,1500));
      await load();setEditId(null);toast('✅ 已更新','ok');}
    catch(e){toast('更新失敗: '+e.message,'err');}finally{setSaving(false);}};

  const del=async id=>{
    if(!confirm('確定刪除此帳本？'))return;
    try{await gasCall('deleteLedger',{id});await load();toast('已刪除');}
    catch(e){toast('刪除失敗','err');}};

  if(loading)return<div className="min-h-screen bg-bg flex items-center justify-center">
    <div className="text-center">
      <Spin/>
      <p className="text-tx2 text-sm mt-3">載入帳本中…</p>
    </div>
  </div>;

  return<div className="min-h-screen bg-bg pb-10">
    <div className="pt-safe"/>
    <div className="px-5 pt-6 pb-4">
      <h1 className="text-3xl font-black">算帳啦 💰</h1>
      <p className="text-tx2 text-sm mt-1">選擇或建立帳本</p>
    </div>
    <div className="px-4 mb-3">
      {ledgers.map(l=>(
        <div key={l.id} className="bg-c1 rounded-2xl border border-bd mb-3 overflow-hidden">
          <div className="flex items-center gap-3 px-4 py-4 cursor-pointer active:opacity-70"
            onClick={()=>onEnter(l.id,l.name)}>
            <div className="w-12 h-12 rounded-2xl bg-c2 flex items-center justify-center text-2xl flex-shrink-0">{l.emoji||'💰'}</div>
            <div className="flex-1 min-w-0">
              <p className="font-black text-lg">{l.name}</p>
              <p className="text-xs text-tx3 mt-0.5">點擊進入</p>
            </div>
            <button onClick={e=>{e.stopPropagation();setEditId(l.id);setEditName(l.name);setEditEmoji(l.emoji||'💰');}}
              className="w-9 h-9 rounded-full bg-c2 flex items-center justify-center text-tx3 text-base mr-1">✏️</button>
            {l.id!=='default'&&<button onClick={e=>{e.stopPropagation();del(l.id);}}
              className="w-9 h-9 rounded-full bg-c2 flex items-center justify-center text-tx3 text-lg">🗑</button>}
          </div>
        </div>))}
    </div>
    <div className="px-4">
      <button onClick={()=>setShowNew(true)}
        className="w-full py-4 rounded-2xl border-2 border-dashed border-bd text-tx2 font-bold text-base flex items-center justify-center gap-2 active:opacity-70">
        ＋ 新增帳本
      </button>
    </div>

    {/* New ledger sheet */}
    {showNew&&<Sheet title="新增帳本" onClose={()=>setShowNew(false)}>
      <p className="text-xs font-bold text-tx3 uppercase tracking-wider mb-2">選擇圖示</p>
      <div className="flex flex-wrap gap-2 mb-4">
        {LEMOJI.map(e=><button key={e} onClick={()=>setNewEmoji(e)}
          className={`w-10 h-10 rounded-xl flex items-center justify-center text-xl border-2 ${newEmoji===e?'border-pri bg-pri/15':'border-bd bg-c2'}`}>{e}</button>)}
      </div>
      <p className="text-xs font-bold text-tx3 uppercase tracking-wider mb-2">帳本名稱</p>
      <input value={newName} onChange={e=>setNewName(e.target.value)}
        onKeyDown={e=>e.key==='Enter'&&create()}
        className="w-full bg-c2 border-2 border-bd rounded-2xl px-4 py-3.5 text-base text-tx focus:border-pri outline-none mb-4"
        placeholder="例：家庭開銷" maxLength={20} autoFocus/>
      <Btn onClick={create} disabled={saving}>{saving?'建立中…':'建立帳本'}</Btn>
    </Sheet>}

    {/* Edit ledger sheet */}
    {editId&&<Sheet title="編輯帳本" onClose={()=>setEditId(null)}>
      <p className="text-xs font-bold text-tx3 uppercase tracking-wider mb-2">選擇圖示</p>
      <div className="flex flex-wrap gap-2 mb-4">
        {LEMOJI.map(e=><button key={e} onClick={()=>setEditEmoji(e)}
          className={`w-10 h-10 rounded-xl flex items-center justify-center text-xl border-2 ${editEmoji===e?'border-pri bg-pri/15':'border-bd bg-c2'}`}>{e}</button>)}
      </div>
      <p className="text-xs font-bold text-tx3 uppercase tracking-wider mb-2">帳本名稱</p>
      <input value={editName} onChange={e=>setEditName(e.target.value)}
        className="w-full bg-c2 border-2 border-bd rounded-2xl px-4 py-3.5 text-base text-tx focus:border-pri outline-none mb-4"
        maxLength={20}/>
      <Btn onClick={save} disabled={saving}>{saving?'儲存中…':'儲存'}</Btn>
    </Sheet>}
  </div>;
}

// ══ APP ══
function App(){
  const[screen,setScreen]=useState(()=>{
    const h=location.hash;return h.startsWith('#l=')?'ledger':'list';});
  const[ledgerId,setLedgerId]=useState(()=>{
    const h=location.hash;return h.startsWith('#l=')?h.slice(3):'default';});
  const[ledgerName,setLedgerName]=useState('帳本');
  const[page,setPage]=useState('home');
  const[showAdd,setShowAdd]=useState(false);
  const[showImport,setShowImport]=useState(false);
  const[data,setData]=useState({expenses:[],members:[],settlement:{balance:{},transactions:[]},settles:[]});
  const[loading,setLoading]=useState(true);
  const[toast,setToast]=useState(null);
  const showToast=(msg,type='')=>setToast({msg,type});

  const enterLedger=(id,name)=>{
    setLedgerId(id);setLedgerName(name||'帳本');
    location.hash='l='+id;setScreen('ledger');setPage('home');};
  const backToList=()=>{setScreen('list');location.hash='';setLoading(true);};

  const load=useCallback(async()=>{
    if(screen!=='ledger')return;
    try{const d=await gasCall('getAll',{ledgerId});
      // Use server-calculated settlement (based on post-settle expenses)
      // Fall back to local calc if needed
      const activeExp=d.activeExpenses||d.expenses||[];
      const settle=calcSettle(activeExp,d.members||[]);
      const settlement=d.settlement&&Object.keys(d.settlement.balance||{}).length?d.settlement:settle;
      setData({
        ...d,
        expenses:d.expenses||[],          // full list for records page
        activeExpenses:activeExp,          // post-settle for stats
        settlement,
        settles:d.settles||[]
      });
    }catch(e){showToast('載入失敗: '+e.message,'err');}
    finally{setLoading(false);}
  },[ledgerId,screen]);

  useEffect(()=>{if(screen==='ledger'){setLoading(true);load();}},[screen,ledgerId]);
  useEffect(()=>{
    const t=setInterval(()=>{if(!document.hidden&&screen==='ledger')load();},6000);
    return()=>clearInterval(t);
  },[load,screen]);

  const handleAdd=async expData=>{
    // Optimistic: add to local state immediately
    const tmp={...expData,id:'tmp_'+Date.now(),participants:expData.participants};
    setData(d=>({
      ...d,
      expenses:[tmp,...(d.expenses||[])],
      activeExpenses:[tmp,...(d.activeExpenses||d.expenses||[])],
      settlement:calcSettle([tmp,...(d.activeExpenses||d.expenses||[])],d.members||[])
    }));
    // Background sync
    fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'add',data:expData,ledgerId}),mode:'no-cors'});
    setTimeout(()=>load(),2000); // refresh to get real ID
  };
  const handleDelete=async id=>{
    if(id==='__refresh__'){load();return;}
    // Optimistic delete
    setData(d=>({
      ...d,
      expenses:(d.expenses||[]).filter(e=>e.id!==id),
      activeExpenses:(d.activeExpenses||d.expenses||[]).filter(e=>e.id!==id),
      settlement:calcSettle((d.activeExpenses||d.expenses||[]).filter(e=>e.id!==id),d.members||[])
    }));
    showToast('已刪除');
    fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'delete',id,ledgerId}),mode:'no-cors'});
    setTimeout(()=>load(),2000);
  };

  if(screen==='list')return<>
    <LedgerPage onEnter={enterLedger} toast={showToast}/>
    {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
  </>;

  if(loading)return<div className="min-h-screen bg-bg flex items-center justify-center"><Spin/></div>;

  return<div className="min-h-screen bg-bg text-tx">
    {page==='home'&&<HomePage data={data} onGoPage={setPage} ledgerName={ledgerName} onBack={backToList}/>}
    {page==='records'&&<RecordsPage data={data} onDelete={handleDelete} onImport={()=>setShowImport(true)} ledgerName={ledgerName} onBack={backToList} ledgerId={ledgerId}/>}
    {page==='settle'&&<SettlePage data={data} ledgerId={ledgerId} onRefresh={load} toast={showToast} ledgerName={ledgerName} onBack={backToList}
      onLocalSettle={()=>setData(d=>({
          ...d,
          // Archive: move expenses to settledExpenses, clear active
          settledExpenses:[...(d.settledExpenses||[]),...(d.expenses||[])],
          expenses:[],
          settlement:{balance:Object.fromEntries(Object.keys(d.settlement?.balance||{}).map(k=>[k,0])),transactions:[]}
        }))}/>}
    {page==='members'&&<MembersPage data={data} ledgerId={ledgerId} onRefresh={load} toast={showToast} ledgerName={ledgerName} onBack={backToList}/>}
    {showAdd&&<AddPage members={data.members} expenses={data.expenses||[]} onSave={handleAdd} onClose={()=>setShowAdd(false)} onImport={()=>{setShowAdd(false);setShowImport(true);}} toast={showToast}/>}
    {showImport&&<ImportSheet members={data.members} ledgerId={ledgerId} existingExpenses={data.expenses||[]} onDone={()=>{setShowImport(false);load();}} onClose={()=>setShowImport(false)} toast={showToast}/>}
    <Nav page={page} onNav={setPage} onAdd={()=>setShowAdd(true)}/>
    {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
