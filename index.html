<body class="bg-bg text-tx">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ══════════════════════════════════════════
// CONFIG — change GAS_URL to your deployed URL
// ══════════════════════════════════════════
// ══ 填入你的 GAS 部署 URL ══
// 例：const GAS_URL = 'https://script.google.com/macros/s/AKfycbx.../exec';
// 留空 = 使用 mock 示範資料（不連後端）
const GAS_URL = '';

// ══════════════════════════════════════════
// API LAYER
// ══════════════════════════════════════════
const api = {
  async call(action, payload = {}) {
    if (!GAS_URL) return mockApi(action, payload);
    try {
      // GAS CORS fix: use no Content-Type header (avoids preflight)
      // Send as plain text, GAS still parses JSON body
      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action, ...payload }),
        redirect: 'follow',
      });
      const text = await res.text();
      const data = JSON.parse(text);
      if (data.error) throw new Error(data.error);
      return data;
    } catch (e) {
      console.error('API Error:', e);
      throw e;
    }
  },
  getAll: (ledgerId) => api.call('getAll', { ledgerId }),
  add: (data, ledgerId) => api.call('add', { data, ledgerId }),
  del: (id, ledgerId) => api.call('delete', { id, ledgerId }),
  saveMembers: (members, ledgerId) => api.call('saveMembers', { members, ledgerId }),
};

// Mock data for demo
let _mock = {
  expenses: [
    { id:'1', date:'2026-03-22', description:'晚餐', amount:800, payer:'Ember', participants:['Ember','Oliver'], category:'餐飲' },
    { id:'2', date:'2026-03-22', description:'計程車', amount:320, payer:'Oliver', participants:['Ember','Oliver'], category:'交通' },
    { id:'3', date:'2026-03-21', description:'咖啡', amount:180, payer:'Ember', participants:['Ember','Oliver'], category:'餐飲' },
  ],
  members: [{ name:'Ember', avatar:'🐸' }, { name:'Oliver', avatar:'🐷' }],
};
function mockApi(action, payload) {
  const { data, id, members, ledgerId } = payload;
  if (action === 'getAll') {
    const bal = {};
    _mock.members.forEach(m => bal[m.name] = 0);
    _mock.expenses.forEach(e => {
      const t = parseFloat(e.amount), ps = e.participants;
      if (bal[e.payer] !== undefined) bal[e.payer] += t;
      const share = t / ps.length;
      ps.forEach(p => { if (bal[p] !== undefined) bal[p] -= share; });
    });
    const tx = [], cr = [], db = [];
    Object.entries(bal).forEach(([p,a]) => {
      if (a > 0.01) cr.push({p,a}); if (a < -0.01) db.push({p,a:-a});
    });
    cr.sort((a,b)=>b.a-a.a); db.sort((a,b)=>b.a-a.a);
    let i=0,j=0;
    while(i<cr.length&&j<db.length){
      const pay=Math.min(cr[i].a,db[j].a);
      tx.push({from:db[j].p,to:cr[i].p,amount:Math.round(pay)});
      cr[i].a-=pay; db[j].a-=pay;
      if(cr[i].a<0.01)i++; if(db[j].a<0.01)j++;
    }
    return { expenses: _mock.expenses, members: _mock.members, settlement: { balance: bal, transactions: tx } };
  }
  if (action === 'add') {
    const exp = { id: Date.now().toString(), ...data };
    _mock.expenses.unshift(exp);
    return { success: true };
  }
  if (action === 'delete') {
    _mock.expenses = _mock.expenses.filter(e => e.id !== id);
    return { success: true };
  }
  if (action === 'saveMembers') {
    _mock.members = members;
    return { success: true };
  }
  return {};
}

// ══════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════
const CATS = ['餐飲','交通','住宿','娛樂','購物','其他'];
const CICO = { '餐飲':'🍜','交通':'🚗','住宿':'🏠','娛樂':'🎉','購物':'🛍️','其他':'📌' };
const EMOS = ['🐶','🐱','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐙','🦋','🐬'];
const fmt = n => 'NT$' + Math.abs(Math.round(Number(n))).toLocaleString();
const dav = n => !n ? '👤' : EMOS[[...n].reduce((a,c)=>a+c.charCodeAt(0),0)%EMOS.length];
const mav = m => (typeof m==='object' ? m.avatar||dav(m.name) : dav(m));
const mname = m => typeof m==='object' ? m.name : m;
const today = () => new Date().toISOString().slice(0,10);

// ══════════════════════════════════════════
// COMPONENTS
// ══════════════════════════════════════════

// Toast
function Toast({ msg, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2000); return () => clearTimeout(t); }, []);
  return (
    <div className={`fixed bottom-24 left-1/2 -translate-x-1/2 z-50 fade-in
      px-5 py-3 rounded-3xl text-sm font-semibold whitespace-nowrap border
      ${type==='ok'?'border-grn text-grn bg-c2':type==='err'?'border-red text-red bg-c2':'border-bd text-tx bg-c2'}`}
      style={{bottom:'calc(80px + env(safe-area-inset-bottom,0px))'}}>
      {msg}
    </div>
  );
}

// Icon button
const IconBtn = ({ onClick, children, className='' }) => (
  <button onClick={onClick}
    className={`w-10 h-10 rounded-full bg-c2 border border-bd flex items-center justify-center
    text-tx2 text-lg active:scale-90 transition-transform ${className}`}>
    {children}
  </button>
);

// ── HOME PAGE ──
function HomePage({ data, onAdd }) {
  const { expenses=[], members=[], settlement={} } = data;
  const { balance={}, transactions=[] } = settlement;
  const total = expenses.reduce((s,e)=>s+parseFloat(e.amount),0);
  const mo = new Date().toISOString().slice(0,7);
  const monthTotal = expenses.filter(e=>(e.date||'').startsWith(mo))
    .reduce((s,e)=>s+parseFloat(e.amount),0);
  const recent = expenses.slice(0,3);

  return (
    <div className="pb-nav">
      {/* Safe area top */}
      <div className="safe-top" />

      {/* Header */}
      <div className="px-5 pt-4 pb-2 flex items-center justify-between">
        <div>
          <p className="text-tx2 text-sm font-semibold tracking-widest uppercase">群組支出</p>
          <p className="text-4xl font-black text-tx mt-1 tracking-tight">{fmt(total)}</p>
        </div>
        <div className="text-right">
          <p className="text-tx3 text-xs">本月</p>
          <p className="text-xl font-bold text-pri">{fmt(monthTotal)}</p>
        </div>
      </div>

      {/* Stats pills */}
      <div className="px-5 flex gap-3 mt-2 mb-4">
        {[
          { label:'本月筆數', val: expenses.filter(e=>(e.date||'').startsWith(mo)).length + '筆' },
          { label:'成員', val: members.length + '人' },
          { label:'待結算', val: transactions.length > 0 ? transactions.length+'筆' : '已結清' },
        ].map(s => (
          <div key={s.label} className="flex-1 bg-c1 rounded-2xl p-3 text-center border border-bd">
            <p className="text-sm font-bold text-tx">{s.val}</p>
            <p className="text-xs text-tx3 mt-1">{s.label}</p>
          </div>
        ))}
      </div>

      {/* Balances */}
      {members.length > 0 && (
        <>
          <div className="px-5 mb-2">
            <p className="text-tx3 text-xs font-bold uppercase tracking-wider">淨收付</p>
          </div>
          <div className="mx-4 bg-c1 rounded-2xl overflow-hidden border border-bd mb-4">
            {members.map((m,i) => {
              const a = balance[mname(m)] || 0;
              return (
                <div key={i} className={`flex items-center gap-3 px-4 py-3 ${i<members.length-1?'border-b border-bd':''}`}>
                  <div className="w-10 h-10 rounded-full bg-c2 flex items-center justify-center text-xl">{mav(m)}</div>
                  <div className="flex-1">
                    <p className="font-bold text-base">{mname(m)}</p>
                    <p className="text-xs text-tx2">{a>0.5?'別人欠你':a<-0.5?'你欠別人':'已結清'}</p>
                  </div>
                  <p className={`font-black text-lg ${a>0.5?'text-grn':a<-0.5?'text-red':'text-tx3'}`}>
                    {(a>=0?'+':'')}{fmt(a)}
                  </p>
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* Debt transactions */}
      {transactions.length > 0 && (
        <>
          <div className="px-5 mb-2">
            <p className="text-tx3 text-xs font-bold uppercase tracking-wider">需要轉帳</p>
          </div>
          <div className="mx-4 bg-c1 rounded-2xl overflow-hidden border border-bd mb-4">
            {transactions.slice(0,3).map((t,i) => {
              const mf = members.find(m=>mname(m)===t.from)||t.from;
              const mt = members.find(m=>mname(m)===t.to)||t.to;
              return (
                <div key={i} className={`flex items-center px-4 py-3 ${i<transactions.length-1?'border-b border-bd':''}`}>
                  <div className="flex flex-col items-center w-16">
                    <span className="text-2xl">{mav(mf)}</span>
                    <span className="text-xs text-tx2 font-semibold mt-1 truncate w-16 text-center">{t.from}</span>
                  </div>
                  <div className="flex-1 flex flex-col items-center gap-1 px-2">
                    <span className="text-xs text-tx3">需要支付</span>
                    <span className="text-lg font-black text-pri">{fmt(t.amount)}</span>
                    <div className="w-full h-0.5 bg-bd relative">
                      <div className="absolute right-0 top-1/2 -translate-y-1/2 w-0 h-0 border-t-4 border-b-4 border-l-8 border-transparent border-l-pri" />
                    </div>
                  </div>
                  <div className="flex flex-col items-center w-16">
                    <span className="text-2xl">{mav(mt)}</span>
                    <span className="text-xs text-tx2 font-semibold mt-1 truncate w-16 text-center">{t.to}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* Recent expenses */}
      {recent.length > 0 && (
        <>
          <div className="px-5 mb-2">
            <p className="text-tx3 text-xs font-bold uppercase tracking-wider">最近帳目</p>
          </div>
          <div className="mx-4 bg-c1 rounded-2xl overflow-hidden border border-bd mb-4">
            {recent.map((e,i) => (
              <div key={e.id} className={`flex items-center gap-3 px-4 py-3 ${i<recent.length-1?'border-b border-bd':''}`}>
                <div className="w-10 h-10 rounded-2xl bg-c2 flex items-center justify-center text-xl flex-shrink-0">{CICO[e.category]||'📌'}</div>
                <div className="flex-1 min-w-0">
                  <p className="font-semibold text-base truncate">{e.description}</p>
                  <p className="text-xs text-tx2 mt-0.5">{e.date?.slice(5)} · {e.payer} 付</p>
                </div>
                <p className="font-bold text-base">{fmt(e.amount)}</p>
              </div>
            ))}
          </div>
        </>
      )}

      {members.length === 0 && (
        <div className="mx-4 bg-c1 rounded-2xl p-8 text-center border border-bd">
          <p className="text-4xl mb-3">👥</p>
          <p className="font-bold text-lg">還沒有成員</p>
          <p className="text-tx2 text-sm mt-1">先到「成員」頁新增</p>
        </div>
      )}
    </div>
  );
}

// ── ADD EXPENSE PAGE (full screen) ──
function AddPage({ members, onSave, onClose, toast }) {
  const [amt, setAmt] = useState('');
  const [desc, setDesc] = useState('');
  const [date, setDate] = useState(today());
  const [payer, setPayer] = useState(members[0] ? mname(members[0]) : '');
  const [cat, setCat] = useState('餐飲');
  const [split, setSplit] = useState('equal'); // 'equal' | 'custom'
  const [selected, setSelected] = useState(members.map(mname));
  const [customAmt, setCustomAmt] = useState({});
  const [loading, setLoading] = useState(false);
  const amtRef = useRef();

  useEffect(() => { setTimeout(() => amtRef.current?.focus(), 350); }, []);

  const toggleMember = (n) => {
    setSelected(s => s.includes(n) ? s.filter(x=>x!==n) : [...s, n]);
  };

  const customSum = Object.values(customAmt).reduce((a,b)=>a+(parseFloat(b)||0), 0);
  const totalAmt = parseFloat(amt) || 0;

  const handleSubmit = async () => {
    if (!desc.trim()) { toast('請輸入描述','err'); return; }
    if (!totalAmt || totalAmt <= 0) { toast('請輸入金額','err'); return; }
    let participants;
    if (split === 'equal') {
      if (!selected.length) { toast('請選擇分攤對象','err'); return; }
      participants = selected;
    } else {
      const obj = {};
      Object.entries(customAmt).forEach(([k,v]) => { if (parseFloat(v)>0) obj[k]=parseFloat(v); });
      if (!Object.keys(obj).length) { toast('請填入各人金額','err'); return; }
      if (Math.abs(customSum - totalAmt) > 0.5) { toast('合計需等於總金額','err'); return; }
      participants = obj;
    }
    setLoading(true);
    try {
      await onSave({ description: desc.trim(), amount: totalAmt, payer, date, category: cat, participants });
      toast('✅ 已記帳','ok');
      onClose();
    } catch(e) { toast('記帳失敗','err'); }
    finally { setLoading(false); }
  };

  return (
    <div className="fixed inset-0 bg-bg z-50 flex flex-col slide-up">
      {/* Top bar */}
      <div className="safe-top" />
      <div className="flex items-center gap-3 px-4 py-3 border-b border-bd flex-shrink-0">
        <button onClick={onClose} className="w-9 h-9 rounded-full bg-c2 flex items-center justify-center text-tx2 text-lg press">✕</button>
        <h2 className="text-lg font-black flex-1">記帳</h2>
      </div>

      {/* Scrollable body */}
      <div className="flex-1 overflow-y-auto px-4 pt-4 pb-2">
        {/* Amount */}
        <div className="mb-5">
          <label className="text-xs font-bold text-tx3 uppercase tracking-wider block mb-2">金額</label>
          <div className="relative">
            <span className="absolute left-4 top-1/2 -translate-y-1/2 text-tx3 text-sm font-semibold pointer-events-none" style={{opacity:amt?0:1}}>NT$</span>
            <input ref={amtRef} type="number" value={amt} onChange={e=>setAmt(e.target.value)}
              className="w-full bg-c2 border-2 border-bd rounded-2xl pl-12 pr-4 py-4 text-4xl font-black text-tx focus:border-pri outline-none transition-colors"
              placeholder="0" inputMode="decimal" style={{minHeight:'80px'}} />
          </div>
        </div>

        {/* Description */}
        <div className="mb-5">
          <label className="text-xs font-bold text-tx3 uppercase tracking-wider block mb-2">描述</label>
          <input type="text" value={desc} onChange={e=>setDesc(e.target.value)}
            className="w-full bg-c2 border-2 border-bd rounded-2xl px-4 py-3.5 text-base text-tx focus:border-pri outline-none"
            placeholder="例：晚餐、計程車…" />
        </div>

        {/* Date + Payer */}
        <div className="grid grid-cols-2 gap-3 mb-5">
          <div>
            <label className="text-xs font-bold text-tx3 uppercase tracking-wider block mb-2">日期</label>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)}
              className="w-full bg-c2 border-2 border-bd rounded-2xl px-4 py-3.5 text-base text-tx focus:border-pri outline-none" />
          </div>
          <div>
            <label className="text-xs font-bold text-tx3 uppercase tracking-wider block mb-2">付款人</label>
            <select value={payer} onChange={e=>setPayer(e.target.value)}
              className="w-full bg-c2 border-2 border-bd rounded-2xl px-4 py-3.5 text-base text-tx focus:border-pri outline-none appearance-none">
              {members.map(m => <option key={mname(m)}>{mname(m)}</option>)}
            </select>
          </div>
        </div>

        {/* Category */}
        <div className="mb-5">
          <label className="text-xs font-bold text-tx3 uppercase tracking-wider block mb-2">分類</label>
          <div className="flex gap-2 overflow-x-auto pb-1">
            {CATS.map(c => (
              <button key={c} onClick={()=>setCat(c)}
                className={`flex-shrink-0 px-4 py-2.5 rounded-3xl text-sm font-semibold border-2 transition-all press
                  ${cat===c?'border-pri bg-pri/15 text-pri':'border-bd bg-c2 text-tx2'}`}>
                {CICO[c]} {c}
              </button>
            ))}
          </div>
        </div>

        {/* Split mode */}
        <div className="mb-5">
          <label className="text-xs font-bold text-tx3 uppercase tracking-wider block mb-2">分攤方式</label>
          <div className="flex bg-c2 rounded-2xl p-1 gap-1 mb-3">
            {[['equal','⚖️ 平均'],['custom','✏️ 自訂']].map(([v,l]) => (
              <button key={v} onClick={()=>setSplit(v)}
                className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all
                  ${split===v?'bg-pri text-bg':'text-tx2'}`}>{l}</button>
            ))}
          </div>

          {split === 'equal' ? (
            <div className="flex flex-wrap gap-2">
              {members.map(m => {
                const n = mname(m);
                const on = selected.includes(n);
                return (
                  <button key={n} onClick={()=>toggleMember(n)}
                    className={`flex flex-col items-center gap-1.5 px-4 py-3 rounded-2xl border-2 transition-all press
                      ${on?'border-pri bg-pri/15 text-pri':'border-bd bg-c2 text-tx2'}`}
                    style={{minWidth:'72px'}}>
                    <span className="text-2xl">{mav(m)}</span>
                    <span className="text-sm font-semibold">{n}</span>
                  </button>
                );
              })}
            </div>
          ) : (
            <div className="bg-c2 rounded-2xl overflow-hidden border border-bd">
              {members.map((m,i) => {
                const n = mname(m);
                return (
                  <div key={n} className={`flex items-center gap-3 px-4 py-3 ${i<members.length-1?'border-b border-bd':''}`}>
                    <span className="text-2xl">{mav(m)}</span>
                    <span className="flex-1 font-semibold text-base">{n}</span>
                    <div className="relative w-28">
                      <span className="absolute left-3 top-1/2 -translate-y-1/2 text-tx3 text-sm pointer-events-none">NT$</span>
                      <input type="number" value={customAmt[n]||''} onChange={e=>setCustomAmt(p=>({...p,[n]:e.target.value}))}
                        className="w-full bg-c3 border border-bd rounded-xl pl-9 pr-3 py-2 text-sm font-bold text-right text-tx outline-none focus:border-pri"
                        placeholder="0" inputMode="decimal" />
                    </div>
                  </div>
                );
              })}
              {totalAmt > 0 && (
                <div className={`px-4 py-2 text-center text-sm font-semibold ${Math.abs(customSum-totalAmt)<0.5?'text-grn bg-grn/10':'text-red bg-red/10'}`}>
                  {Math.abs(customSum-totalAmt)<0.5 ? `✅ 合計 ${fmt(customSum)} 相符` :
                    customSum < totalAmt ? `⚠ 還差 ${fmt(totalAmt-customSum)}` : `⚠ 超出 ${fmt(customSum-totalAmt)}`}
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* Fixed bottom submit */}
      <div className="flex-shrink-0 px-4 pt-3 pb-3 border-t border-bd safe-bot bg-bg">
        <button onClick={handleSubmit} disabled={loading}
          className="w-full py-4 rounded-2xl bg-pri text-bg text-lg font-black disabled:opacity-50 press active:scale-95 transition-transform">
          {loading ? '記帳中…' : '✓ 記帳'}
        </button>
      </div>
    </div>
  );
}

// ── RECORDS PAGE ──
function RecordsPage({ data, onDelete }) {
  const { expenses=[], members=[] } = data;
  if (!expenses.length) return (
    <div className="pb-nav flex flex-col items-center justify-center min-h-screen text-center px-6">
      <p className="text-5xl mb-4">📭</p>
      <p className="text-lg font-bold">還沒有帳目</p>
      <p className="text-tx2 text-sm mt-1">點 ＋ 新增第一筆</p>
    </div>
  );

  const groups = {};
  expenses.forEach(e => {
    const m = (e.date||'').slice(0,7);
    if (!groups[m]) groups[m] = [];
    groups[m].push(e);
  });

  const slb = (p) => {
    if (Array.isArray(p)) return p.length === members.length ? '所有人平分' : p.join('、')+' 平分';
    if (p && typeof p==='object') return Object.entries(p).map(([k,v])=>`${k} ${fmt(v)}`).join(' / ');
    return '';
  };

  return (
    <div className="pb-nav">
      <div className="safe-top" />
      <div className="px-5 pt-4 pb-2">
        <h1 className="text-2xl font-black">帳目</h1>
        <p className="text-tx2 text-sm mt-1">共 {expenses.length} 筆</p>
      </div>
      {Object.keys(groups).sort().reverse().map(month => (
        <div key={month}>
          <p className="px-5 py-2 text-xs font-bold text-tx3 uppercase tracking-wider">{month}</p>
          <div className="mx-4 bg-c1 rounded-2xl overflow-hidden border border-bd mb-3">
            {groups[month].map((e,i) => (
              <div key={e.id} className={`flex items-center gap-3 px-4 py-3 ${i<groups[month].length-1?'border-b border-bd':''}`}>
                <div className="w-11 h-11 rounded-2xl bg-c2 flex items-center justify-center text-xl flex-shrink-0">{CICO[e.category]||'📌'}</div>
                <div className="flex-1 min-w-0">
                  <p className="font-semibold text-base truncate">{e.description}</p>
                  <p className="text-xs text-tx2 mt-0.5 truncate">{e.date?.slice(5)} · {e.payer} 付 · {slb(e.participants)}</p>
                </div>
                <div className="text-right flex-shrink-0">
                  <p className="font-bold text-base">{fmt(e.amount)}</p>
                </div>
                <button onClick={()=>{ if(confirm('確定刪除？')) onDelete(e.id); }}
                  className="text-tx3 text-lg px-1 py-1 ml-1 press">🗑</button>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── SETTLE PAGE ──
function SettlePage({ data }) {
  const { members=[], settlement={} } = data;
  const { balance={}, transactions=[] } = settlement;

  return (
    <div className="pb-nav">
      <div className="safe-top" />
      <div className="px-5 pt-4 pb-3">
        <h1 className="text-2xl font-black">結算</h1>
      </div>

      <div className="px-5 mb-2">
        <p className="text-xs font-bold text-tx3 uppercase tracking-wider">各人餘額</p>
      </div>
      <div className="mx-4 bg-c1 rounded-2xl overflow-hidden border border-bd mb-5">
        {members.length === 0 && <p className="px-4 py-4 text-tx2 text-sm text-center">尚無成員</p>}
        {members.map((m,i) => {
          const a = balance[mname(m)] || 0;
          const sub = a>0.5?`待收 ${fmt(a)}`:a<-0.5?`待付 ${fmt(a)}`:'已結清';
          return (
            <div key={i} className={`flex items-center gap-3 px-4 py-3 ${i<members.length-1?'border-b border-bd':''}`}>
              <div className="w-11 h-11 rounded-full bg-c2 flex items-center justify-center text-2xl">{mav(m)}</div>
              <div className="flex-1">
                <p className="font-bold text-base">{mname(m)}</p>
                <p className="text-xs text-tx2 mt-0.5">{sub}</p>
              </div>
              <p className={`font-black text-lg ${a>0.5?'text-grn':a<-0.5?'text-red':'text-tx3'}`}>
                {(a>=0?'+':'')}{fmt(a)}
              </p>
            </div>
          );
        })}
      </div>

      <div className="px-5 mb-2">
        <p className="text-xs font-bold text-tx3 uppercase tracking-wider">轉帳建議</p>
      </div>
      <div className="mx-4 bg-c1 rounded-2xl overflow-hidden border border-bd mb-5">
        {transactions.length === 0
          ? <p className="px-4 py-5 text-grn text-sm font-bold text-center">🎉 目前已結清！</p>
          : transactions.map((t,i) => {
            const mf = members.find(m=>mname(m)===t.from)||t.from;
            const mt = members.find(m=>mname(m)===t.to)||t.to;
            return (
              <div key={i} className={`flex items-center px-4 py-4 ${i<transactions.length-1?'border-b border-bd':''}`}>
                <div className="flex flex-col items-center w-20">
                  <span className="text-2xl">{mav(mf)}</span>
                  <span className="text-xs text-tx2 font-semibold mt-1 truncate w-20 text-center">{t.from}</span>
                </div>
                <div className="flex-1 flex flex-col items-center gap-1">
                  <span className="text-xs text-tx3">需要支付</span>
                  <span className="text-xl font-black text-pri">{fmt(t.amount)}</span>
                  <div className="w-4/5 h-0.5 bg-bd relative">
                    <div className="absolute right-0 top-1/2 -translate-y-1/2 w-0 h-0 border-t-[5px] border-b-[5px] border-l-[9px] border-transparent border-l-pri" />
                  </div>
                </div>
                <div className="flex flex-col items-center w-20">
                  <span className="text-2xl">{mav(mt)}</span>
                  <span className="text-xs text-tx2 font-semibold mt-1 truncate w-20 text-center">{t.to}</span>
                </div>
              </div>
            );
          })}
      </div>
    </div>
  );
}

// ── MEMBERS PAGE ──
function MembersPage({ data, onSave, toast }) {
  const { members=[] } = data;
  const [newName, setNewName] = useState('');
  const [saving, setSaving] = useState(false);

  const addMember = async () => {
    const name = newName.trim();
    if (!name) return;
    if (members.some(m=>mname(m)===name)) { toast('成員已存在','err'); return; }
    setSaving(true);
    try {
      const updated = [...members, { name, avatar: '' }];
      await onSave(updated);
      setNewName('');
      toast('✅ 已新增 '+name,'ok');
    } catch(e) { toast('儲存失敗','err'); }
    finally { setSaving(false); }
  };

  const removeMember = async (name) => {
    if (!confirm(`確定移除「${name}」？`)) return;
    try {
      await onSave(members.filter(m=>mname(m)!==name));
      toast('已移除 '+name);
    } catch(e) { toast('移除失敗','err'); }
  };

  return (
    <div className="pb-nav">
      <div className="safe-top" />
      <div className="px-5 pt-4 pb-3">
        <h1 className="text-2xl font-black">成員</h1>
        <p className="text-tx2 text-sm mt-1">{members.length} 位成員</p>
      </div>

      <div className="mx-4 bg-c1 rounded-2xl overflow-hidden border border-bd mb-5">
        {members.length === 0 && (
          <p className="px-4 py-4 text-tx2 text-sm text-center">尚無成員，請新增</p>
        )}
        {members.map((m,i) => (
          <div key={i} className={`flex items-center gap-3 px-4 py-3 ${i<members.length-1?'border-b border-bd':''}`}>
            <div className="w-11 h-11 rounded-full bg-c2 flex items-center justify-center text-2xl">{mav(m)}</div>
            <p className="flex-1 font-bold text-base">{mname(m)}</p>
            <button onClick={()=>removeMember(mname(m))}
              className="text-tx3 text-lg px-2 py-2 press">✕</button>
          </div>
        ))}
        <div className="flex gap-3 px-4 py-3 border-t border-bd">
          <input value={newName} onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&addMember()}
            className="flex-1 bg-c3 border border-bd rounded-xl px-4 py-3 text-base text-tx outline-none focus:border-pri"
            placeholder="輸入姓名" maxLength={10} />
          <button onClick={addMember} disabled={saving}
            className="px-5 py-3 bg-pri rounded-xl text-bg font-black text-base disabled:opacity-50 press">
            新增
          </button>
        </div>
      </div>

      <div className="mx-4 bg-c1 rounded-2xl p-4 border border-bd">
        <p className="text-sm font-bold text-tx2 mb-2">💡 提示</p>
        <p className="text-sm text-tx3 leading-relaxed">
          分享帳本連結給朋友，大家可以同時記帳。<br />
          右上角 🔗 複製連結。
        </p>
      </div>
    </div>
  );
}

// ── BOTTOM NAV ──
function BottomNav({ page, onNav, onAdd }) {
  const tabs = [
    { id:'home', icon:'📊', label:'總覽' },
    { id:'records', icon:'📋', label:'帳目' },
    null, // FAB placeholder
    { id:'settle', icon:'💸', label:'結算' },
    { id:'members', icon:'👥', label:'成員' },
  ];
  return (
    <nav className="fixed bottom-0 left-0 right-0 bg-c1/95 backdrop-blur-xl border-t border-bd z-40 flex items-center px-2 safe-bot"
      style={{height:'calc(60px + env(safe-area-inset-bottom,0px))'}}>
      {tabs.map((tab, i) => tab === null ? (
        <div key="fab" className="flex-1 flex justify-center items-center">
          <button onClick={onAdd}
            className="w-14 h-14 rounded-full bg-pri flex items-center justify-center text-2xl text-bg font-black shadow-lg press active:scale-90 transition-transform"
            style={{boxShadow:'0 0 0 8px rgba(245,200,66,.12), 0 4px 20px rgba(245,200,66,.35)'}}>
            ＋
          </button>
        </div>
      ) : (
        <button key={tab.id} onClick={()=>onNav(tab.id)}
          className={`flex-1 flex flex-col items-center justify-center gap-1 h-full press
            ${page===tab.id?'text-pri':'text-tx3'}`}>
          <span className="text-2xl leading-none">{tab.icon}</span>
          <span className="text-xs font-bold">{tab.label}</span>
        </button>
      ))}
    </nav>
  );
}

// ══════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════
function App() {
  const [page, setPage] = useState('home');
  const [showAdd, setShowAdd] = useState(false);
  const [data, setData] = useState({ expenses:[], members:[], settlement:{balance:{},transactions:[]} });
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  const [ledgerId] = useState(() => {
    const h = location.hash;
    return h.startsWith('#l=') ? h.slice(3) : 'default';
  });

  const showToast = (msg, type='') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2500);
  };

  const loadData = useCallback(async () => {
    try {
      const d = await api.getAll(ledgerId);
      setData(d);
    } catch(e) { showToast('載入失敗','err'); }
    finally { setLoading(false); }
  }, [ledgerId]);

  useEffect(() => { loadData(); }, [loadData]);

  // Poll for updates every 5 seconds
  useEffect(() => {
    const timer = setInterval(() => {
      if (!document.hidden) loadData();
    }, 5000);
    return () => clearInterval(timer);
  }, [loadData]);

  const handleAdd = async (expData) => {
    await api.add(expData, ledgerId);
    await loadData();
  };

  const handleDelete = async (id) => {
    try {
      await api.del(id, ledgerId);
      await loadData();
      showToast('已刪除');
    } catch(e) { showToast('刪除失敗','err'); }
  };

  const handleSaveMembers = async (members) => {
    await api.saveMembers(members, ledgerId);
    await loadData();
  };

  if (loading) return (
    <div className="min-h-screen bg-bg flex items-center justify-center">
      <div className="w-8 h-8 border-2 border-bd border-t-pri rounded-full animate-spin" />
    </div>
  );

  return (
    <div className="min-h-screen bg-bg text-tx">
      {page === 'home' && <HomePage data={data} onAdd={()=>setShowAdd(true)} />}
      {page === 'records' && <RecordsPage data={data} onDelete={handleDelete} />}
      {page === 'settle' && <SettlePage data={data} />}
      {page === 'members' && <MembersPage data={data} onSave={handleSaveMembers} toast={showToast} />}

      {showAdd && (
        <AddPage
          members={data.members}
          onSave={handleAdd}
          onClose={()=>setShowAdd(false)}
          toast={showToast}
        />
      )}

      <BottomNav page={page} onNav={setPage} onAdd={()=>setShowAdd(true)} />

      {toast && <Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
